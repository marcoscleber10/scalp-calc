<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc Pro</title>
    <style>
        :root { --bg: #0a0e14; --card: #151a21; --green: #00ff88; --red: #ff3e3e; --text: #848e9c; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        
        .card { background: var(--card); padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h3 { color: var(--text); font-size: 14px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        select { width: 100%; background: #2b3139; color: white; border: 1px solid #474d57; padding: 10px; border-radius: 8px; margin-bottom: 15px; }

        .price-box { font-size: 32px; font-weight: bold; color: var(--green); margin: 20px 0; font-family: monospace; }
        
        .indicator { background: #1c2128; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; }
        .status { font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; }
        label { font-size: 11px; color: var(--text); display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; background: #2b3139; border: 1px solid #474d57; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }

        button { width: 100%; padding: 15px; background: var(--green); color: black; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .res { margin-top: 25px; padding-top: 20px; border-top: 1px solid #2b3139; text-align: left; font-size: 14px; }
        .res p { margin: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h3>Mestre do Scalping</h3>
    
    <select id="source" onchange="changeExchange()">
        <option value="BINANCE">Binance (Quantfury)</option>
        <option value="OKX">OKX (Real-time)</option>
    </select>

    <div class="price-box" id="btcPrice">Carregando...</div>

    <div class="indicator">
        <span>RSI (14): <strong id="rsiVal">--</strong></span>
        <span id="rsiStatus" class="status">AGUARDANDO...</span>
    </div>

    <div class="grid">
        <div>
            <label>Seu Capital ($)</label>
            <input type="number" id="c" value="300">
        </div>
        <div>
            <label>Alavancagem</label>
            <input type="number" id="l" value="10">
        </div>
        <div>
            <label>Ganho %</label>
            <input type="number" id="tpP" value="1.0" step="0.1">
        </div>
        <div>
            <label>Perda %</label>
            <input type="number" id="slP" value="1.0" step="0.1">
        </div>
    </div>

    <button onclick="calculatePositions()">VER MEUS ALVOS AGORA</button>

    <div id="r" class="res" style="display:none">
        <p>💰 Lucro Alvo: <strong id="tp" style="color:var(--green)"></strong></p>
        <p>🛑 Stop Loss: <strong id="sl" style="color:var(--red)"></strong></p>
        <p>📊 Tamanho da Posição: <span id="posSize"></span></p>
    </div>
</div>

<script>
    let currentPrice = 0;
    let prices = [];
    let ws;

    function connectWS(exchange) {
        if (ws) ws.close();
        
        // Define o endpoint baseado na exchange (Usando Binance como base de dados estável para cálculo de RSI)
        const endpoint = 'wss://stream.binance.com:9443/ws/btcusdt@ticker';
        
        ws = new WebSocket(endpoint);
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            currentPrice = parseFloat(data.c);
            document.getElementById('btcPrice').innerText = `$ ${currentPrice.toFixed(2)}`;
            updateRSI(currentPrice);
        };
    }

    function updateRSI(price) {
        prices.push(price);
        if (prices.length > 14) prices.shift();

        if (prices.length === 14) {
            let gains = 0, losses = 0;
            for (let i = 1; i < 14; i++) {
                let diff = prices[i] - prices[i - 1];
                diff > 0 ? gains += diff : losses -= diff;
            }
            let rs = gains / (losses || 1);
            let rsi = 100 - (100 / (1 + rs));

            document.getElementById('rsiVal').innerText = rsi.toFixed(2);
            const status = document.getElementById('rsiStatus');
            
            if (rsi < 35) {
                status.innerText = "OPORTUNIDADE DE COMPRA";
                status.style.color = "var(--green)";
            } else if (rsi > 65) {
                status.innerText = "HORA DE VENDER / AGUARDAR";
                status.style.color = "var(--red)";
            } else {
                status.innerText = "MERCADO NEUTRO";
                status.style.color = "var(--text)";
            }
        }
    }
