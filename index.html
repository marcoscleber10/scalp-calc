<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; cursor: pointer; }
        
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: 'Courier New', monospace; text-shadow: 0 0 10px rgba(0,255,136,0.2); }
        
        .status-bar { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; transition: 0.3s; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }

        /* Container do Gráfico corrigido */
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; background: #000; }

        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--green); }

        button { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        
        /* Seção de Resultados Expandida */
        .res { margin-top: 20px; padding-top: 15px; border-top: 1px solid #30363d; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px; }
        .res-item span:last-child { font-weight: bold; font-family: monospace; }
        .val-detail { font-size: 10px; color: var(--text); display: block; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping</h4>
    
    <select id="exchange" onchange="initApp()">
        <option value="BINANCE">Binance (Quantfury)</option>
        <option value="OKX">OKX (Real-time)</option>
        <option value="HYPER">Hyperliquid (BTC/USDC)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div id="statusBox" class="status-bar">
        <span id="statusMsg">CONECTANDO...</span>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="0.5" step="0.1"></div>
    </div>

    <button onclick="calc()">Ver Meus Alvos Agora</button>

    <div id="results" class="res">
        <div class="res-item">
            <span>🟢 Lucro Alvo:</span>
            <div style="text-align: right;">
                <span id="resTP" style="color:var(--green)"></span>
                <span class="val-detail" id="profitVal"></span>
            </div>
        </div>
        <div class="res-item">
            <span>🛑 Stop Loss:</span>
            <div style="text-align: right;">
                <span id="resSL" style="color:var(--red)"></span>
                <span class="val-detail" id="lossVal"></span>
            </div>
        </div>
        <div class="res-item">
            <span>📊 Total Operado:</span>
            <span id="resSize"></span>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;

    function initApp() {
        if (ws) ws.close();
        const ex = document.getElementById('exchange').value;
        
        // Correção do carregamento do gráfico
        const symbol = ex === "HYPER" ? "HYPERLIQUID:BTCUSDC" : "BINANCE:BTCUSDT";
        
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "chart_container"
        });

        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            
            const box = document.getElementById('statusBox');
            const msg = document.getElementById('statusMsg');
            if (price % 2 === 0) {
                msg.innerText = "🔥 OPORTUNIDADE DE COMPRA";
                box.className = "status-bar buy";
            } else {
                msg.innerText = "⚠️ HORA DE VENDER / AGUARDAR";
                box.className = "status-bar sell";
            }
        };
    }

    function calc() {
        if (price === 0) return;
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tpPct = parseFloat(document.getElementById('tpP').value);
        const slPct = parseFloat(document.getElementById('slP').value);

        const totalOperado = cap * lev;
        const tpPrice = price * (1 + (tpPct / 100));
        const slPrice = price * (1 - (slPct / 100));
        
        // Cálculo do valor financeiro real baseado na alavancagem
        const profitCash = totalOperado * (tpPct / 100);
        const lossCash = totalOperado * (slPct / 100);

        // Atualização da Interface
        document.getElementById('resTP').innerText = `$ ${tpPrice.toFixed(2)}`;
        document.getElementById('profitVal').innerText = `(+ $ ${profitCash.toFixed(2)} | +${tpPct}%)`;
        
        document.getElementById('resSL').innerText = `$ ${slPrice.toFixed(2)}`;
        document.getElementById('lossVal').innerText = `(- $ ${lossCash.toFixed(2)} | -${slPct}%)`;
        
        document.getElementById('resSize').innerText = `$ ${totalOperado.toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    initApp();
</script>
</body>
</html>
