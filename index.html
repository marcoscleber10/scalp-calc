<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        /* ========== ESTILOS COMPLETOS (MANTIDOS) ========== */
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --green: #00ff88;
            --red: #ff3e3e;
            --text: #8b949e;
            --accent: #2f81f7;
            --gold: #ffcc00;
            --purple: #9d4edd;
            --orange: #ff9900;
            --bright-yellow: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; transition: filter 0.5s, box-shadow 0.5s; }
        .card { background: var(--card); padding: 24px; border-radius: 24px; width: 100%; max-width: 420px; border: 1px solid #30363d; box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: all 0.3s; }
        .card.desktop-mode { max-width: 95%; }
        .desktop-mode #chart_container { height: 500px !important; }
        h4 { color: var(--text); font-size: 12px; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px dashed #30363d; }
        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 12px; text-transform: uppercase; }
        .time-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 12px 5px; border-radius: 40px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .time-btn.active[data-t="15"] { background: var(--gold); color: #000; border-color: var(--gold); }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 15px; border-radius: 40px; margin-bottom: 20px; font-size: 14px; cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%239aa4b3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 18px center; background-size: 16px; }
        .price { font-size: 42px; font-weight: 800; color: var(--green); text-align: center; margin-bottom: 15px; font-family: 'Courier New', monospace; text-shadow: 0 0 10px #00ff8840; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .status-bar { background: #0f141c; padding: 12px 5px; border-radius: 20px; border: 1px solid #2a3340; text-align: center; position: relative; overflow: hidden; }
        .status-label { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
        .status-value { font-size: 14px; font-weight: bold; display: block; }
        .light-glow { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: currentColor; filter: blur(4px); opacity: 0.5; }
        .score-container { margin-bottom: 15px; }
        .score-bar { background: #1e2a38; height: 20px; border-radius: 10px; overflow: hidden; margin: 5px 0; }
        .score-fill { height: 100%; width: 0%; transition: width 0.3s; }
        .score-fill.alta { background: linear-gradient(90deg, #00ff88, #00cc66); }
        .score-fill.media { background: linear-gradient(90deg, #ffcc00, #ffaa00); }
        .score-fill.baixa { background: linear-gradient(90deg, #ff3e3e, #cc0000); }
        .score-text { display: flex; justify-content: space-between; font-size: 11px; color: var(--text); }
        @keyframes flashGreen {
            0% { background-color: rgba(0,255,136,0); }
            50% { background-color: rgba(0,255,136,0.3); }
            100% { background-color: rgba(0,255,136,0); }
        }
        @keyframes flashRed {
            0% { background-color: rgba(255,62,62,0); }
            50% { background-color: rgba(255,62,62,0.3); }
            100% { background-color: rgba(255,62,62,0); }
        }
        .alerta-compra { animation: flashGreen 0.5s ease-in-out 3; }
        .alerta-venda { animation: flashRed 0.5s ease-in-out 3; }
        .badge-alerta {
            background: var(--gold);
            color: #000;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 15px;
            display: inline-block;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.8; transform: scale(1); }
        }
        .modo-operacao {
            background: #1e2a38;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--accent);
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { display: none; }
        .slider {
            position: absolute;
            cursor: pointer;
            background-color: #444;
            border-radius: 24px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            border-radius: 50%;
            transition: .4s;
        }
        input:checked + .slider { background-color: #00ff88; }
        input:checked + .slider:before { transform: translateX(26px); }
        #statusModo { color: var(--text); font-size: 12px; font-weight: bold; }
        .modo-descanso { filter: brightness(0.3); }
        .modo-ativo { box-shadow: 0 0 20px #00ff88 inset; }
        .alarme-section {
            background: #1e2a38;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px solid var(--gold);

        .alarme-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .alarme-input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        .alarme-input {
            flex: 1;
            background: #0d151f;
            border: 1px solid #3d4d62;

        .alarme-item {

            padding: 8px;

        .alarme-remover {

            padding: 3px 8px;

        #chart_container { width: 100%; height: 220px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; transition: height 0.3s; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 20px; font-size: 14px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 40px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px; box-shadow: 0 6px 0 #0b5e3c; transform: translateY(-2px); transition: 0.1s; margin-top: 10px; }
        .btn-calc:active { transform: translateY(4px); box-shadow: 0 2px 0 #0b5e3c; }
        .res { margin-top: 20px; padding: 18px; background: #0f151d; border-radius: 24px; display: none; border: 1px solid #2a3440; }
        .projects-section { margin-top: 30px; border-top: 1px solid #30363d; padding-top: 20px; }
        .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .project-btn { background: #1a222c; color: #c9d1d9; border: 1px solid #30363d; padding: 12px 5px; border-radius: 30px; font-size: 11px; font-weight: 600; text-decoration: none; text-align: center; display: block; cursor: pointer; }
        .project-btn:hover { background: #26323f; }
        .ad-container { margin-top: 25px; padding: 15px; background: #161e28; border-radius: 30px; border: 1px solid #ffcc0040; text-align: center; }
        .btn-ad { display: inline-block; background: #ffcc00; color: #000; text-decoration: none; padding: 12px 32px; border-radius: 40px; font-weight: 800; margin-top: 10px; border: 1px solid #ffcc66; box-shadow: 0 4px 0 #8f651f; transform: translateY(-2px); transition: 0.1s; }
        .btn-ad:active { transform: translateY(2px); box-shadow: 0 1px 0 #8f651f; }
        .market-table { width: 100%; font-size: 11px; margin-top: 20px; border-collapse: collapse; color: #b6c2d2; }
        .market-table td { padding: 8px 4px; border-bottom: 1px solid #222b35; }
        .market-header { color: var(--accent); font-weight: 700; font-size: 10px; letter-spacing: 1.5px; padding-top: 15px; }
        .floating-ball { position: fixed; bottom: 30px; right: 30px; width: 70px; height: 70px; background: radial-gradient(circle at 30% 30%, var(--green), #0f8f5c); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0b0f14; font-weight: 900; font-size: 28px; box-shadow: 0 10px 25px #00ff8880; cursor: pointer; z-index: 9999; border: 2px solid white; }
        .copy-code-btn {
            background: linear-gradient(135deg, #2a2a3a, #1a1a2a);
            border: 1px solid #3a6ea5;
            color: #3a6ea5;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }
        .copy-code-btn:hover {
            background: linear-gradient(135deg, #3a6ea5, #2a5a8a);
            color: white;
            border-color: #5a8ec5;
        }
        /* Campo de busca de pares */
        .search-pair-input {
            width: 100%;
            background: #0d151f;
            border: 1px solid #3d4d62;
            color: white;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 13px;
            margin-bottom: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .search-pair-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 5px var(--accent);
        }
        .search-pair-input::placeholder {
            color: #5a6e8a;
        }
        /* ===== MODAL PRINCIPAL (Dados de Mercado) ===== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }
        .modal-content {
            background: #161b22;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--gold);
            position: relative;
            z-index: 1000000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        /* ===== SUBMODAL PARA DETALHES DAS ESTRATÉGIAS ===== */
        .submodal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000000;
        }
        .submodal-content {
            background: #1e2a36;
            padding: 25px;
            border-radius: 25px;
            width: 90%;

            max-height: 80vh;

            border: 2px solid var(--accent);

            box-shadow: 0 20px 30px rgba(0,0,0,0.5);

        .button-group { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

        .button-group button:hover { background: var(--green); color: #000; }
        .close-btn, .btn-detalhe, .btn-filter, .btn-atualizar, .btn-mode, .btn-calc { cursor: pointer; transition: 0.2s; }
        .close-btn:hover, .btn-detalhe:hover, .btn-filter:hover, .btn-atualizar:hover, .btn-mode:hover, .btn-calc:hover { filter: brightness(1.1); }
        .campo { margin-bottom: 15px; }

        .donation-item { background: #1e2a36; padding: 15px; border-radius: 15px; margin: 10px 0; border-left: 5px solid; }

        .copy-btn { background: var(--accent); border: none; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; margin-left: 10px; }
        .copy-btn:hover { background: var(--green); color: #000; }
        .console { background: #0d1117; padding: 10px; border-radius: 10px; margin: 10px 0; font-size: 12px; font-family: monospace; height: 50px; overflow-y: auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .vol-indicator { display: inline-block; padding: 4px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; margin-left: 8px; }
        .vol-alta { background: #00ff8820; color: #00ff88; border: 1px solid #00ff88; }
        .vol-media { background: #ffcc0020; color: #ffcc00; border: 1px solid #ffcc00; }
        .vol-baixa { background: #ff3e3e20; color: #ff3e3e; border: 1px solid #ff3e3e; }
