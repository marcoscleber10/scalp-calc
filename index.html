<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: max-width 0.3s ease; }
        .card.desktop-mode { max-width: 95%; }
        
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; }
        
        .time-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; font-size: 14px; cursor: pointer; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; border-bottom: 3px solid #30363d; text-align: center; position: relative; }
        .status-label { font-size: 8px; color: var(--text); display: block; margin-bottom: 4px; text-transform: uppercase; }

        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .res { margin-top: 20px; padding: 15px; background: #0d1117; border-radius: 8px; border: 1px solid #30363d; text-align: left; display: none; }
        
        /* BOTÃO CONFIGURAÇÕES (BOLINHA) */
        .secret-dot { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: 2px solid white; box-shadow: 0 0 15px rgba(47, 129, 247, 0.5); }
        
        /* PAINEL DE AUTENTICAÇÃO */
        #authBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        
        /* PAINEL DO ROBÔ */
        #botControl { display: none; margin-top: 20px; padding: 15px; border: 1px dashed var(--green); border-radius: 12px; background: rgba(0, 255, 136, 0.05); }

        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: bold; text-align: center; }
        .ad-container { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1e2227, #161b22); border-radius: 12px; border: 1px solid #ffcc0033; }
        .btn-ad { display: block; background: #ffcc00; color: #000; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 10px; text-align: center;}
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ Modo Computador</button>

    <div class="time-selector">
        <button class="time-btn active" onclick="setTF('1', this)">⚡ SCALP (1m)</button>
        <button class="time-btn" onclick="setTF('15', this)">🔭 DAY TRADE (15m)</button>
    </div>

    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="BINANCE:ETHUSDT">Binance - ETH/USDT</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid - BTC/USD</option>
        <option value="TVC:GOLD">Ouro (XAUUSD)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div class="status-grid">
        <div id="statusBox" class="status-bar"><span class="status-label">SINAL GERAL</span><span id="statusText">CONECTANDO...</span></div>
        <div id="rsiBox" class="status-bar"><span class="status-label">FILTRO TÉCNICO</span><span id="rsiText">COLETANDO...</span></div>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Calcular Alvos</button>

    <div id="results" class="res"></div>

    <div id="botControl">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <span style="color:var(--green); font-size:11px; font-weight:bold;">🤖 ROBÔ HYPERLIQUID</span>
            <span style="font-size:8px; color:var(--text);">Status: Pronto</span>
        </div>
        <button class="btn-calc" style="background:var(--accent); color:white; padding:12px;">ATIVAR EXECUÇÃO</button>
    </div>

    <div class="projects-grid">
        <a href="#" class="project-btn">Dashboard 97</a>
        <a href="#" class="project-btn">Pepinômetro</a>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 11px; font-weight: bold;">📺 SÍTIO MÃE MARIA / ATMOS</span>
        <a href="https://wa.me/5597991916621" target="_blank" class="btn-ad">TESTE GRÁTIS</a>
    </div>
</div>

<div class="secret-dot" onclick="openAuth()">⚙️</div>

<div id="authBox">
    <h3 style="color:var(--accent)">Acesso ao Sistema</h3>
    <input type="password" id="passInput" placeholder="Digite a Senha" style="width:200px; text-align:center;">
    <button class="btn-calc" style="width:200px; margin-top:10px;" onclick="checkPass()">ENTRAR</button>
    <p onclick="closeAuth()" style="color:var(--text); cursor:pointer; margin-top:20px; font-size:12px;">Cancelar</p>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0; let activeWS = null; let currentTF = "1";

    function setTF(tf, btn) {
        currentTF = tf;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initApp();
    }

    function toggleMode() {
        document.getElementById('mainCard').classList.toggle('desktop-mode');
        initApp();
    }

    function initApp() {
        const symbol = document.getElementById('pairSelector').value;
        document.getElementById('chart_container').innerHTML = ''; 
        new TradingView.widget({ "autosize": true, "symbol": symbol, "interval": currentTF, "theme": "dark", "container_id": "chart_container", "locale": "br" });
        
        if(activeWS) activeWS.close();
        let p = symbol.split(':')[1].toLowerCase();
        activeWS = new WebSocket(`wss://stream.binance.com:9443/ws/${p.includes('gold') ? 'btcusdt' : p}@ticker`);
        activeWS.onmessage = (e) => {
            const data = JSON.parse(e.data); price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
            document.getElementById('statusText').innerText = "🔥 OPORTUNIDADE";
            document.getElementById('rsiText').innerText = "🚀 COMPRA";
        };
    }

    function calc() {
        const res = document.getElementById('results');
        res.style.display = 'block';
        res.innerHTML = `<div style="display:flex; justify-content:space-between;"><span>🟢 Saída (TP):</span><span style="color:var(--green); font-weight:bold;">$ ${(price * 1.01).toFixed(2)}</span></div>
                         <div style="display:flex; justify-content:space-between; margin-top:10px;"><span>🛑 Stop (SL):</span><span style="color:var(--red); font-weight:bold;">$ ${(price * 0.99).toFixed(2)}</span></div>`;
    }

    function openAuth() { document.getElementById('authBox').style.display = 'flex'; }
    function closeAuth() { document.getElementById('authBox').style.display = 'none'; }
    function checkPass() {
        if(document.getElementById('passInput').value === "1234") {
            closeAuth(); document.getElementById('botControl').style.display = 'block';
        } else { alert("Senha Incorreta"); }
    }

    initApp();
</script>
</body>
</html>
