<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc Multi-Exchange</title>
    <style>
        body { font-family: sans-serif; background: #0a0e14; color: white; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: #151a21; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #2b3139; }
        .price-box { font-size: 28px; font-weight: bold; color: #00ff88; margin: 10px 0; text-align: center; min-height: 40px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .indicator { display: flex; justify-content: space-between; margin: 15px 0; padding: 10px; background: #1c2128; border-radius: 8px; font-size: 14px; }
        .status { font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .buy { background: #00ff8822; color: #00ff88; }
        .sell { background: #ff3e3e22; color: #ff3e3e; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00ff88; color: black; margin-top: 10px; font-size: 16px; }
        .res { margin-top: 20px; padding: 15px; border-top: 1px solid #2b3139; line-height: 1.8; background: #1c2128; border-radius: 8px; }
        .flex { display: flex; gap: 10px; }
        .flex div { flex: 1; }
        label { font-size: 12px; color: #848e9c; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="text-align:center">ScalpCalc Multi-Exchange</h3>
        
        <label>Fonte de Dados:</label>
        <select id="exchangeSelect" onchange="changeExchange()">
            <option value="binance">Binance (BTC/USDT)</option>
            <option value="hyperliquid">Hyperliquid (BTC/USDC)</option>
        </select>

        <div class="price-box" id="priceDisplay">Conectando...</div>
        
        <div class="indicator">
            <span>RSI (14): <strong id="rsiVal">--</strong></span>
            <span id="rsiStatus" class="status">Aguardando...</span>
        </div>

        <div class="flex">
            <div><label>Capital ($):</label><input type="number" id="capital" value="300"></div>
            <div><label>Alavancagem:</label><input type="number" id="lev" value="10"></div>
        </div>

        <div class="flex">
            <div><label>Lucro Alvo %:</label><input type="number" id="tpPerc" value="1.0" step="0.1"></div>
            <div><label>Stop Loss %:</label><input type="number" id="slPerc" value="0.5" step="0.1"></div>
        </div>

        <button onclick="calculate()">CALCULAR POSIÇÃO</button>

        <div id="results" class="res" style="display:none">
            <div>🎯 <strong>Saída (TP):</strong> <span id="tp" style="color:#00ff88"></span></div>
            <div>🛑 <strong>Stop (SL):</strong> <span id="sl" style="color:#ff3e3e"></span></div>
            <div>📊 <strong>Total Operado:</strong> <span id="posSize"></span></div>
        </div>
    </div>

    <script>
        let currentPrice = 0;
        let prices = [];
        let socket;

        function connectBinance() {
            if(socket) socket.close();
            socket = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                updateUI(parseFloat(data.c));
            };
        }

        function connectHyperliquid() {
            if(socket) socket.close();
            socket = new WebSocket('wss://api.hyperliquid.xyz/ws');
            socket.onopen = () => {
                socket.send(JSON.stringify({"method": "subscribe", "subscription": {"type": "l2Book", "coin": "BTC"}}));
            };
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.data && data.data.levels) {
                    const midPrice = (parseFloat(data.data.levels[0][0].px) + parseFloat(data.data.levels[1][0].px)) / 2;
                    updateUI(midPrice);
                }
            };
        }

        function updateUI(price) {
            currentPrice = price;
            document.getElementById('priceDisplay').innerText = `$ ${currentPrice.toFixed(2)}`;
            calculateRSI(price);
        }

        function calculateRSI(price) {
            prices.push(price);
            if(prices.length > 14) prices.shift();
            if(prices.length === 14) {
                let gains = 0, losses = 0;
                for(let i=1; i<14; i++) {
                    let diff = prices[i] - prices[i-1];
                    diff > 0 ? gains += diff : losses -= diff;
                }
                let rsi = 100 - (100 / (1 + (gains / (losses || 0.001))));
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                const status = document.getElementById('rsiStatus');
                if(rsi < 35) { status.innerText = "COMPRA"; status.className = "status buy"; }
                else if(rsi > 65) { status.innerText = "VENDA"; status.className = "status sell"; }
                else { status.innerText = "NEUTRO"; status.className = "status"; }
            }
        }

        function calculate() {
            if(currentPrice === 0) {
                alert("Aguarde o preço carregar!");
                return;
            }
            const cap = parseFloat(document.getElementById('capital').value);
            const l = parseFloat(document.getElementById('lev').value);
            const tpP = parseFloat(document.getElementById('tpPerc').value) / 100;
            const slP = parseFloat(document.getElementById('slPerc').value) / 100;

            document.getElementById('tp').innerText = `$ ${(currentPrice * (1 + tpP)).toFixed(2)}`;
            document.getElementById('sl').innerText = `$ ${(currentPrice * (1 - slP)).toFixed(2)}`;
            document.getElementById('posSize').innerText = `$ ${(cap * l).toFixed(2)}`;
            document.getElementById('results').style.display = 'block';
        }

        function changeExchange() {
            prices = [];
            document.getElementById('priceDisplay').innerText = "Conectando...";
            const ex = document.getElementById('exchangeSelect').value;
            ex === 'binance' ? connectBinance() : connectHyperliquid();
        }

        connectBinance();
    </script>
</body>
</html>
