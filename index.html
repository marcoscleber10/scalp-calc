<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentralWeb • Hub da Internet</title>
    <!-- Font Awesome 6 (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0c0c14;
            color: #eaeef2;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 1rem;
        }

        body.light-mode {
            background: #f0f2f5;
            color: #1e1e2f;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(20, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.2s ease;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.2rem;
            padding: 1.2rem 2rem;
            margin-bottom: 2rem;
            background: rgba(20, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(145deg, #7b8cff, #c07cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-global {
            flex: 1;
            min-width: 260px;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 60px;
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .search-global i {
            color: #9aa0b0;
            font-size: 1.2rem;
            margin-right: 0.8rem;
        }

        .search-global input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 0.6rem 0;
            color: inherit;
            font-size: 1rem;
            outline: none;
        }

        .search-global input::placeholder {
            color: #7f8596;
        }

        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(30, 32, 45, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            margin-top: 0.5rem;
            padding: 0.8rem 0;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
            display: none;
        }
        .search-suggestions div {
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .search-suggestions div:hover {
            background: rgba(255,255,255,0.1);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .header-actions button {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body.light-mode .header-actions button {
            background: rgba(0,0,0,0.05);
            color: #333;
            border-color: rgba(0,0,0,0.1);
        }

        .header-actions button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.07);
        }

        .clock {
            background: rgba(255,255,255,0.08);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .crypto-widget {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: rgba(0,0,0,0.3);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            align-items: center;
        }
        .crypto-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .crypto-item i {
            font-size: 1rem;
        }
        .crypto-item span:last-child {
            font-weight: 600;
            color: #7bff9c;
        }

        .favorites-bar {
            background: rgba(25, 28, 40, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 1rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .favorites-title {
            font-size: 1rem;
            color: #b5bcd0;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }
        .favorites-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .favorite-item {
            background: rgba(255,255,255,0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .favorite-item:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .favorite-item i:first-child {
            font-size: 1.3rem;
            color: #ffb347;
        }
        .favorite-item .fa-times-circle {
            color: #ff7b7b;
            font-size: 1rem;
            margin-left: 0.5rem;
        }

        .projects-section {
            margin-bottom: 2rem;
        }
        .projects-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ffd966;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .project-item {
            background: linear-gradient(145deg, #2a2f4b, #1e2235);
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 1px solid #4a4f70;
            transition: 0.2s;
            cursor: pointer;
        }
        .project-item:hover {
            transform: translateY(-4px);
            border-color: #7b8cff;
            box-shadow: 0 10px 20px #1e1e3f;
        }
        .project-item i {
            font-size: 2rem;
            color: #7b8cff;
        }
        .project-item span {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .project-item small {
            font-size: 0.8rem;
            color: #aab6fe;
        }

        .daily-section {
            margin-bottom: 2rem;
        }
        .daily-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .daily-title i {
            color: #fbbf24;
        }
        .daily-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .daily-item {
            background: rgba(40, 45, 60, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
            cursor: pointer;
        }
        .daily-item:hover {
            transform: translateY(-4px);
            background: rgba(55, 60, 80, 0.8);
            border-color: #7b8cff;
        }
        .daily-item i {
            font-size: 2.2rem;
            color: #a0b0ff;
        }
        .daily-item span {
            font-weight: 500;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(330px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .category-card {
            background: rgba(22, 25, 37, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }
        .category-card:hover {
            transform: translateY(-5px);
            border-color: rgba(130, 150, 255, 0.5);
            box-shadow: 0 25px 40px -12px #2a2f5a;
        }
        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 0.8rem;
        }
        .category-title i {
            color: #7b8cff;
            font-size: 1.6rem;
        }
        .links-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .link-item {
            background: rgba(255,255,255,0.06);
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            text-decoration: none;
            color: inherit;
            font-size: 0.95rem;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        .link-item i:first-child {
            font-size: 1.3rem;
            color: #aab6fe;
        }
        .link-item:hover {
            background: rgba(255,255,255,0.12);
            transform: scale(1.02);
            border-color: rgba(255,255,255,0.2);
        }
        .link-item .fa-star {
            margin-left: 0.3rem;
            font-size: 0.9rem;
            color: #6f7588;
            transition: 0.2s;
        }
        .link-item .fa-star:hover {
            color: #fbbf24;
        }
        .link-item .fa-star.favorited {
            color: #fbbf24;
        }

        /* Blocos informativos dentro da categoria combustível */
        .fuel-info-block {
            margin-top: 1rem;
            padding-top: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.2);
        }
        .fuel-info-item {
            background: rgba(30, 35, 50, 0.6);
            border-radius: 24px;
            padding: 1rem 1.2rem;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .fuel-info-item:hover {
            background: rgba(45, 50, 70, 0.7);
            transform: translateY(-2px);
        }
        .fuel-info-title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .fuel-info-title i {
            color: #ffd966;
        }
        .fuel-info-desc {
            font-size: 0.9rem;
            color: #cbd5e6;
            line-height: 1.4;
        }
        .fuel-info-desc strong {
            color: #ffd966;
        }
        .fuel-info-button {
            display: inline-block;
            margin-top: 0.7rem;
            background: #2a6f5c;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: white;
            text-decoration: none;
            transition: 0.2s;
        }
        .fuel-info-button:hover {
            background: #1e8f72;
        }

        .ad-card {
            background: linear-gradient(145deg, #2a1f3a, #1a1f3a);
            border: 2px solid #ffd966;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .ad-card .category-title {
            border-bottom: none;
            color: #ffd966;
        }
        .ad-card .category-title i {
            color: #ffd966;
        }
        .ad-card .ad-button {
            background: #25D366;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            transition: 0.2s;
        }
        .ad-card .ad-button:hover {
            background: #128C7E;
            transform: scale(1.05);
        }

        .info-card {
            background: rgba(50, 55, 80, 0.8);
            border-left: 4px solid #ffd966;
        }
        .info-card .category-title {
            border-bottom: none;
            color: #ffd966;
            font-size: 1.2rem;
        }
        .info-card .info-content {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ddd;
        }

        .history-section {
            background: rgba(22, 25, 37, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.8rem;
            margin-top: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .history-title {
            font-size: 1.4rem;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .history-items {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #8e96b0;
            font-size: 0.9rem;
        }

        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
            .daily-grid, .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .crypto-widget {
                justify-content: center;
            }
        }
        @media (max-width: 480px) {
            .daily-grid, .projects-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <div class="container">
        <header class="header">

            <div class="search-global">

                    <i class="fas fa-expand"></i>

        <div class="favorites-bar">

        <div class="projects-section">

        <div class="daily-section">

        <div class="history-section">

        </div>

        <footer class="footer">
            <p>© 2026 CentralWeb • Seu hub da internet • <i class="fas fa-bolt"></i> edição especial</p>
        </footer>
    </div>

                { keywords: ["grok"], url: "https://grok.com", name: "Grok" },
                { keywords: ["lumio"], url: "https://www.lumio.ai/", name: "Lumio AI" },
                { keywords: ["antigravity"], url: "https://antigravity.google/", name: "Google Antigravity" },
                { keywords: ["manus"], url: "https://manus.im/", name: "Manus" },
                { keywords: ["n8n"], url: "https://n8n.io/", name: "n8n" },
                { keywords: ["flowise"], url: "https://flowiseai.com/", name: "Flowise" },
                { keywords: ["crewai"], url: "https://www.crewai.com/", name: "CrewAI" },
                { keywords: ["autogen"], url: "https://microsoft.github.io/autogen/", name: "AutoGen" },
                { keywords: ["langchain"], url: "https://www.langchain.com/", name: "LangChain" },
                { keywords: ["eesel"], url: "https://www.eesel.ai/", name: "eesel AI" },
                { keywords: ["copilot studio"], url: "https://www.microsoft.com/en-us/microsoft-copilot/microsoft-copilot-studio", name: "Microsoft Copilot Studio" },
                { keywords: ["watsonx"], url: "https://www.ibm.com/products/watsonx-assistant", name: "IBM Watsonx Assistant" },
                { keywords: ["shell", "box", "shellbox", "cupom"], url: "https://shellbox.onelink.me/0Eik/6c597fbb?autofill=TRUE&automaticInsertion=TRUE&voucherCode=SFO5024", name: "Shell Box R$15" },
                { keywords: ["petrobras"], url: "https://play.google.com/store/apps/details?id=br.com.petrobras.br.ma02", name: "Petrobras App" },
                { keywords: ["baratao"], url: "https://play.google.com/store/apps/details?id=com.barataoapp&referrer=00296621774", name: "Baratão Combustíveis" },
                { keywords: ["egasosa"], url: "https://www.egasosa.com.br", name: "Egasosa" },
                { keywords: ["ipiranga", "abastece ai"], url: "https://play.google.com/store/apps/details?id=com.ipiranga.abasteceai", name: "Abastece Aí" },
                { keywords: ["livelo", "ale", "pontos"], url: "https://www.livelo.com.br", name: "Livelo – Pontos ALE" },
                { keywords: ["preço justo", "menor preço"], url: "https://site-combustai-620634786284.southamerica-east1.run.app/", name: "Preço Justo – Geolocalização" }
            ];

            // ========== FUNÇÕES DE COTAÇÕES ==========
            async function fetchQuotes() {
                try {
                    const [btcRes, usdRes, brentRes, goldRes] = await Promise.all([
                        fetch('https://economia.awesomeapi.com.br/json/last/BTC-USD'),
                        fetch('https://economia.awesomeapi.com.br/json/last/USD-BRL'),
                        fetch('https://economia.awesomeapi.com.br/json/last/BRENT-USD'),
                        fetch('https://economia.awesomeapi.com.br/json/last/XAU-USD')
                    ]);
                    const btcData = await btcRes.json();
                    const usdData = await usdRes.json();
                    const brentData = await brentRes.json();
                    const goldData = await goldRes.json();

                    if (btcData['BTCUSD']) {
                        const btc = parseFloat(btcData['BTCUSD'].bid).toFixed(2);
                        document.getElementById('btcPrice').innerText = `$${btc}`;
                    }
                    if (usdData['USDBRL']) {
                        const usd = parseFloat(usdData['USDBRL'].bid).toFixed(2);
                        document.getElementById('usdbrl').innerText = `R$ ${usd}`;
                    }
                    if (brentData['BRENTUSD']) {
                        const brent = parseFloat(brentData['BRENTUSD'].bid).toFixed(2);
                        document.getElementById('brent').innerText = `$${brent}`;
                    } else {
                        document.getElementById('brent').innerText = '--';
                    }
                    if (goldData['XAUUSD']) {
                        const gold = parseFloat(goldData['XAUUSD'].bid).toFixed(2);
                        document.getElementById('gold').innerText = `$${gold}`;
                    }
                } catch (error) {
                    console.error('Erro ao buscar cotações:', error);
                }
            }

            // ========== RENDERIZAÇÃO COM SUPORTE A EXTRA BLOCOS ==========
            let favorites = JSON.parse(localStorage.getItem('centralweb_favorites')) || [];
            let history = JSON.parse(localStorage.getItem('centralweb_history')) || [];
            let currentTheme = localStorage.getItem('centralweb_theme') || 'dark';

            const categoriesGrid = document.getElementById('categoriesGrid');
            const favoritesList = document.getElementById('favoritesList');
            const historyItems = document.getElementById('historyItems');
            const dailyGrid = document.getElementById('dailyGrid');
            const projectsGrid = document.getElementById('projectsGrid');
            const themeToggle = document.getElementById('themeToggle');
            const fullscreenBtn = document.getElementById('fullscreenBtn');
            const globalSearch = document.getElementById('globalSearch');
            const searchSuggestions = document.getElementById('searchSuggestions');
            const clockEl = document.getElementById('liveClock');

            function saveFavorites() { localStorage.setItem('centralweb_favorites', JSON.stringify(favorites)); }
            function saveHistory() { localStorage.setItem('centralweb_history', JSON.stringify(history)); }
            function addToHistory(name, url) {
                history = [{ name, url, timestamp: Date.now() }, ...history.filter(h => h.url !== url).slice(0, 9)];
                saveHistory();
                renderHistory();
            }

            function renderProjects() {
                let html = '';
                userProjects.forEach(p => {
                    html += `<div class="project-item" onclick="window.open('${p.url}','_blank'); addToHistory('${p.name}', '${p.url}');">
                        <i class="${p.icon}"></i><span>${p.name}</span><small>${p.url.replace('https://', '').replace('http://', '')}</small>
                    </div>`;
                });
                projectsGrid.innerHTML = html;
            }

            function renderDaily() {
                let html = '';
                dailyLinks.forEach(link => {
                    html += `<div class="daily-item" onclick="window.open('${link.url}','_blank'); addToHistory('${link.name}', '${link.url}');">
                        <i class="${link.icon}"></i><span>${link.name}</span>
                    </div>`;
                });
                dailyGrid.innerHTML = html;
            }

            function renderCategories(filter = '') {
                const f = filter.toLowerCase();
                let html = '';
                categories.forEach(cat => {
                    if (cat.isAd) {
                        html += `<div class="category-card ad-card"><div class="category-title"><i class="fas fa-tv"></i> ${cat.name}</div>
                            <div style="font-size:1.2rem; margin-bottom:0.5rem;">📱 APP + IPTV</div>
                            <div style="font-size:1.5rem; font-weight:bold; color:#ffd966;">R$ 30/mês</div>
                            <div style="margin:0.5rem 0;">Milhares de canais, filmes e séries</div>
                            <a href="https://wa.me/5597991916621" target="_blank" class="ad-button"><i class="fab fa-whatsapp"></i> Peça seu teste grátis de 6h</a>
                        </div>`;
                        return;
                    }
                    if (cat.isInfo) {
                        html += `<div class="category-card info-card"><div class="category-title"><i class="fas ${cat.icon}"></i> ${cat.name}</div>
                            <div class="info-content">${cat.content}</div>
                        </div>`;
                        return;
                    }

                    const filteredLinks = cat.links.filter(l => l.name.toLowerCase().includes(f) || cat.name.toLowerCase().includes(f));
                    if (filteredLinks.length === 0 && f !== '' && !cat.extraBlocks) return;
                    // Se for a categoria combustível e tiver blocos extras, adiciona após os links
                    let categoryHtml = `<div class="category-card"><div class="category-title"><i class="fas ${cat.icon}"></i> ${cat.name}</div><div class="links-list">`;
                    filteredLinks.forEach(link => {
                        const isFav = favorites.some(f => f.url === link.url);
                        categoryHtml += `<a href="${link.url}" target="_blank" class="link-item" data-url="${link.url}" data-name="${link.name}">
                            <i class="${link.icon}"></i> ${link.name}
                            <i class="fas fa-star ${isFav ? 'favorited' : ''}" onclick="event.preventDefault(); event.stopPropagation(); toggleFavorite('${link.name}', '${link.url}', '${link.icon}')"></i>
                        </a>`;
                    });
                    categoryHtml += `</div>`;

                    // Se a categoria é a de combustível e tem extraBlocks, insere-os abaixo
                    if (cat.extraBlocks && cat.extraBlocks.length) {
                        categoryHtml += `<div class="fuel-info-block">`;
                        cat.extraBlocks.forEach(block => {
                            categoryHtml += `
                                <div class="fuel-info-item">
                                    <div class="fuel-info-title"><i class="fas ${block.icon}"></i> ${block.title}</div>
                                    <div class="fuel-info-desc">${block.content}</div>
                                    ${block.buttonText ? `<a href="${block.buttonUrl}" target="_blank" class="fuel-info-button">${block.buttonText}</a>` : ''}
                                </div>
                            `;
                        });
                        categoryHtml += `</div>`;
                    }
                    categoryHtml += `</div>`;
                    html += categoryHtml;
                });
                categoriesGrid.innerHTML = html;
            }

            function renderFavorites() {
                if (favorites.length === 0) { favoritesList.innerHTML = '<span style="color:#aaa;">Clique na estrela para favoritar</span>'; return; }
                favoritesList.innerHTML = favorites.map(f => `
                    <div class="favorite-item" onclick="window.open('${f.url}','_blank'); addToHistory('${f.name}', '${f.url}');">
                        <i class="${f.icon}"></i> ${f.name}
                        <i class="fas fa-times-circle" onclick="event.stopPropagation(); removeFavorite('${f.url}')"></i>
                    </div>
                `).join('');
            }

            function renderHistory() {
                if (history.length === 0) { historyItems.innerHTML = '<span style="color:#aaa;">Nenhum acesso recente</span>'; return; }
                historyItems.innerHTML = history.map(h => `
                    <div class="history-item" onclick="window.open('${h.url}','_blank'); addToHistory('${h.name}', '${h.url}');">
                        <i class="fas fa-clock"></i> ${h.name}
                    </div>
                `).join('');
            }

            // Busca inteligente
            function handleSmartSearch(input) {
                const text = input.toLowerCase().trim();
                if (!text) { searchSuggestions.style.display = 'none'; return; }
                const matches = smartSearchMap.filter(item => item.keywords.some(kw => kw.includes(text) || text.includes(kw)));
                if (matches.length) {
                    searchSuggestions.innerHTML = matches.map(m => `<div onclick="window.open('${m.url}','_blank'); addToHistory('${m.name}', '${m.url}'); globalSearch.value=''; searchSuggestions.style.display='none';"> <i class="fas fa-arrow-right"></i> Ir para ${m.name} </div>`).join('');
                    searchSuggestions.style.display = 'block';
                } else searchSuggestions.style.display = 'none';
            }

            globalSearch.addEventListener('input', (e) => { renderCategories(e.target.value); handleSmartSearch(e.target.value); });
            globalSearch.addEventListener('keypress', (e) => { if (e.key === 'Enter') { const first = searchSuggestions.querySelector('div'); if (first) first.click(); } });
            document.addEventListener('click', (e) => { if (!e.target.closest('.search-global')) searchSuggestions.style.display = 'none'; });

            // Favoritos
            window.toggleFavorite = (name, url, icon) => {
                const idx = favorites.findIndex(f => f.url === url);
                if (idx >= 0) favorites.splice(idx, 1);
                else favorites.push({ name, url, icon });
                saveFavorites(); renderFavorites(); renderCategories(globalSearch.value);
            };
            window.removeFavorite = (url) => {
                favorites = favorites.filter(f => f.url !== url);
                saveFavorites(); renderFavorites(); renderCategories(globalSearch.value);
            };

            // Tema
            function applyTheme(theme) {
                if (theme === 'light') { document.body.classList.add('light-mode'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>'; }
                else { document.body.classList.remove('light-mode'); themeToggle.innerHTML = '<i class="fas fa-moon"></i>'; }
                localStorage.setItem('centralweb_theme', theme);
            }
            themeToggle.addEventListener('click', () => applyTheme(document.body.classList.contains('light-mode') ? 'dark' : 'light'));

            // Tela cheia
            fullscreenBtn.addEventListener('click', () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });

            // Relógio
            function updateClock() { clockEl.textContent = new Date().toLocaleTimeString('pt-BR', { hour12: false }); }
            setInterval(updateClock, 1000); updateClock();

            // Registrar cliques
            document.addEventListener('click', (e) => {
                const link = e.target.closest('.link-item, .daily-item, .project-item, .ad-button, .fuel-info-button');
                if (link && link.href) { const name = link.dataset.name || link.innerText.trim() || 'Link'; const url = link.href; if (name && url) addToHistory(name, url); }
            });

            // Inicialização
            function init() {
                applyTheme(currentTheme);
                renderProjects(); renderDaily(); renderCategories(); renderFavorites(); renderHistory();
                fetchQuotes(); setInterval(fetchQuotes, 60000);
            }
            init();
            window.addToHistory = addToHistory;
        })();
    </script>
</body>
</html>
