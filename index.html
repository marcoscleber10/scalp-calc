<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc 1M</title>
    <style>
        body { font-family: sans-serif; background: #0a0e14; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #151a21; padding: 20px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #2b3139; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00ff88; color: black; }
        .res { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2b3139; }
        .tp { color: #00ff88; } .sl { color: #ff3e3e; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ScalpCalc 1M</h2>
        <label>Preço Entrada:</label>
        <input type="number" id="p" placeholder="Ex: 105000">
        <label>Capital ($):</label>
        <input type="number" id="c" placeholder="Ex: 1000">
        <label>Alavancagem:</label>
        <input type="number" id="l" value="10">
        <button onclick="cal()">CALCULAR</button>
        <div id="r" class="res" style="display:none">
            <p>TP (+0.40%): <span id="tp" class="tp"></span></p>
            <p>SL (-0.25%): <span id="sl" class="sl"></span></p>
        </div>
    </div>
    <script>
        function cal() {
            const p = parseFloat(document.getElementById('p').value);
            if(!p) return;
            document.getElementById('tp').innerText = (p * 1.004).toFixed(2);
            document.getElementById('sl').innerText = (p * 0.9975).toFixed(2);
            document.getElementById('r').style.display = 'block';
        }
    </script>
</body>
</html>
