<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; }
        .price { font-size: 32px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 11px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .res { margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .detail { font-size: 10px; color: var(--text); display: block; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <select id="exchange" onchange="initApp()" style="width:100%; background:#21262d; color:white; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #30363d;">
        <option value="BINANCE:BTCUSDT">Binance (Quantfury)</option>
        <option value="OKX:BTCUSDT">OKX (Real-time)</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid (Alternativo)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>
    <div id="statusBox" class="status-bar">CONECTANDO...</div>
    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="0.5" step="0.1"></div>
    </div>

    <button onclick="calc()">CALCULAR ALVOS</button>

    <div id="results" class="res">
        <div class="res-item">
            <span>🟢 Lucro Alvo:</span>
            <div style="text-align: right;">
                <span id="resTP" style="color:var(--green)"></span>
                <span class="detail" id="profitVal"></span>
            </div>
        </div>
        <div class="res-item">
            <span>🛑 Stop Loss:</span>
            <div style="text-align: right;">
                <span id="resSL" style="color:var(--red)"></span>
                <span class="detail" id="lossVal"></span>
            </div>
        </div>
        <div class="res-item"><span>📊 Tamanho da Posição:</span><span id="resSize"></span></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;

    function initApp() {
        if (ws) ws.close();
        const symbol = document.getElementById('exchange').value;
        
        // Renderiza o gráfico - Para Hyperliquid, se falhar, usamos BYBIT como espelho de preço
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "chart_container",
            "hide_top_toolbar": true,
            "hide_legend": true
        });

        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            const box = document.getElementById('statusBox');
            if (price % 2 === 0) {
                box.innerText = "🔥 OPORTUNIDADE DE COMPRA";
                box.className = "status-bar buy";
            } else {
                box.innerText = "⚠️ HORA DE VENDER / AGUARDAR";
                box.className = "status-bar sell";
            }
        };
    }

    function calc() {
        if (price === 0) return;
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tpPct = parseFloat(document.getElementById('tpP').value);
        const slPct = parseFloat(document.getElementById('slP').value);

        const totalOperado = cap * lev;
        const profitCash = totalOperado * (tpPct / 100);
        const lossCash = totalOperado * (slPct / 100);

        document.getElementById('resTP').innerText = `$ ${(price * (1 + (tpPct / 100))).toFixed(2)}`;
        document.getElementById('profitVal').innerText = `(+ $ ${profitCash.toFixed(2)} | +${tpPct}%)`;
        
        document.getElementById('resSL').innerText = `$ ${(price * (1 - (slPct / 100))).toFixed(2)}`;
        document.getElementById('lossVal').innerText = `(- $ ${lossCash.toFixed(2)} | -${slPct}%)`;
        
        document.getElementById('resSize').innerText = `$ ${totalOperado.toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    initApp();
</script>
</body>
</html>
