<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dashboard Styles */
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        .status-bar { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
        
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .res { margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; font-size: 13px; }

        /* Menu de Projetos (Abas na parte de baixo) */
        .projects-section { margin-top: 30px; border-top: 1px solid #30363d; padding-top: 20px; }
        .projects-title { font-size: 10px; color: var(--text); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .project-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* Estilo da Publicidade Atmos */
        .ad-container { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1e2227, #161b22); border-radius: 12px; border: 1px solid #ffcc0033; }
        .btn-ad { display: block; background: #ffcc00; color: #000; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping</h4>
    
    <select id="exchange" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance (Quantfury)</option>
        <option value="OKX:BTCUSDT">OKX (Real-time)</option>
        <option value="COINBASE:BTCUSD">Hyperliquid (Alternativo)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>
    <div id="statusBox" class="status-bar">ANALISANDO...</div>
    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="1.0" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Ver Meus Alvos Agora</button>

    <div id="results" class="res">
        <div class="res-item">
            <span>🟢 Lucro (TP):</span>
            <span id="resTP" style="color:var(--green)"></span>
        </div>
        <div class="res-item">
            <span>🛑 Perda (SL):</span>
            <span id="resSL" style="color:var(--red)"></span>
        </div>
    </div>

    <div class="projects-section">
        <span class="projects-title">Meus Projetos & Ferramentas</span>
        <div class="projects-grid">
            <a href="https://site-559791916621-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Dashboard 97</a>
            <a href="https://site-combustai-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">CombustAI</a>
            <a href="https://site-557591544835-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Dashboard 75</a>
            <a href="https://pepinometro-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Pepinômetro</a>
            <a href="https://historia-copas-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">História Copas</a>
            <a href="https://investopcao.culturabuilder.com" target="_blank" class="project-btn">InvestOpção</a>
        </div>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 12px; font-weight: bold;">📺 ATMOS IPTV</span>
        <p style="font-size: 10px; color: #ced4da; margin: 5px 0;">Canais, Filmes e Séries por R$ 30,00.</p>
        <a href="https://wa.me/5597991916621" target="_blank" class="btn-ad">TESTE GRÁTIS</a>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;
    function initApp() {
        if (ws) ws.close();
        new TradingView.widget({
            "autosize": true, "symbol": document.getElementById('exchange').value,
            "interval": "1", "theme": "dark", "container_id": "chart_container",
            "hide_top_toolbar": true, "save_image": false
        });
        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            price = parseFloat(JSON.parse(e.data).c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            const box = document.getElementById('statusBox');
            box.innerText = price % 2 === 0 ? "🔥 COMPRA" : "⚠️ AGUARDAR";
            box.className = price % 2 === 0 ? "status-bar buy" : "status-bar sell";
        };
    }
    function calc() {
        if (price === 0) return;
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        document.getElementById('resTP').innerText = `$ ${(price * (1 + tp/100)).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - sl/100)).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }
    initApp();
</script>
</body>
</html>
