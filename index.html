<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .price { font-size: 32px; font-weight: 800; color: var(--green); margin-bottom: 10px; font-family: monospace; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d; overflow: hidden; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-bottom: 15px; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; display: block; margin-bottom: 4px; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; }
        .res { margin-bottom: 20px; padding: 15px; background: #0d1117; border-radius: 10px; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        
        /* PUBLICIDADE ATMOS - IMAGEM EMBUTIDA NO CSS */
        .ad-section { margin-top: 10px; border-top: 1px solid #30363d; padding-top: 15px; }
        .ad-banner { 
            width: 100%; 
            height: 250px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            border-radius: 12px;
            /* A imagem da Atmos agora é este código abaixo */
            background-image: url('https://i.postimg.cc/85MhVst4/atmos-banner.jpg'); 
        }
    </style>
</head>
<body>

<div class="card">
    <select id="exchange" onchange="initApp()" style="width: 100%; background: #21262d; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d;">
        <option value="BINANCE:BTCUSDT">Binance</option>
        <option value="OKX:BTCUSDT">OKX</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid</option>
    </select>

    <div class="price" id="priceText">$--.---</div>
    <div id="statusBox" class="status-bar">CONECTANDO...</div>
    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Perda %</label><input type="number" id="slP" value="1.0" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Ver Meus Alvos Agora</button>

    <div id="results" class="res">
        <div class="res-item"><span>🟢 Lucro Alvo:</span> <span id="resTP" style="color:var(--green)"></span></div>
        <div class="res-item"><span>💵 Valor Lucro:</span> <span id="valTP" style="color:var(--green)"></span></div>
        <div class="res-item"><span>🛑 Stop Loss:</span> <span id="resSL" style="color:var(--red)"></span></div>
        <div class="res-item"><span>💸 Valor Perda:</span> <span id="valSL" style="color:var(--red)"></span></div>
    </div>

    <div class="ad-section">
        <a href="https://wa.me/5597991916621?text=Quero+testar+a+Atmos" target="_blank" style="text-decoration:none;">
            <div class="ad-banner"></div>
        </a>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;
    function initApp() {
        if (ws) ws.close();
        new TradingView.widget({
            "autosize": true, "symbol": document.getElementById('exchange').value,
            "interval": "1", "theme": "dark", "style": "1", "locale": "br", "container_id": "chart_container",
            "hide_top_toolbar": true, "hide_legend": true
        });
        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            price = parseFloat(JSON.parse(e.data).c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            document.getElementById('statusBox').innerText = price % 2 === 0 ? "🔥 COMPRA" : "⚠️ AGUARDAR";
            document.getElementById('statusBox').className = price % 2 === 0 ? "status-bar buy" : "status-bar sell";
        };
    }
    function calc() {
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        const size = cap * lev;
        document.getElementById('resTP').innerText = `$ ${(price * (1 + tp/100)).toFixed(2)}`;
        document.getElementById('valTP').innerText = `+ $ ${(size * tp/100).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - sl/100)).toFixed(2)}`;
        document.getElementById('valSL').innerText = `- $ ${(size * sl/100).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }
    initApp();
</script>
</body>
</html>
