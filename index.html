            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1200px;
            width: 100%;
        }
        h1 {
            color: #00ff88;
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .stats-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 15px;
        }
        .stat-item {
            text-align: center;
            min-width: 120px;
        }
        .stat-label {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
        }
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
        }
        .stat-value.win { color: #00ff88; }
        .stat-value.loss { color: #ff3e3e; }
        
        /* Carteiras */
        .wallets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .wallet-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .wallet-card:hover {
            border-color: #2f81f7;
            transform: translateY(-2px);
        }
        .wallet-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .wallet-emoji { font-size: 24px; }
        .wallet-name {
            font-weight: bold;
            font-size: 16px;
        }
        .wallet-balance {
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }
        .wallet-detail {
            color: #8b949e;
            font-size: 12px;
            margin: 5px 0;
        }
        .wallet-trades {
            font-size: 13px;
            margin-top: 10px;
        }
        .wallet-perfil {
            font-size: 11px;
            color: #8b949e;
            margin-top: 10px;
            font-style: italic;
        }
        
        /* Filtros */
        .filters {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-group label {
            color: #8b949e;
            font-size: 12px;
        }
        select, input {
            background: #21262d;
            border: 1px solid #30363d;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
        }
        .btn-reset {
            background: #2f81f7;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Tabela */
        .table-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th {
            color: #8b949e;
            font-weight: normal;
            text-align: left;
            padding: 12px 8px;
            border-bottom: 1px solid #30363d;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #222b35;
        }
        tr:hover {
            background: #1a222c;
        }
        .badge-win {
            background: #00ff8820;
            color: #00ff88;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
            display: inline-block;
        }
        .badge-loss {
            background: #ff3e3e20;
            color: #ff3e3e;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
            display: inline-block;
        }
        .badge-open {
            background: #ffcc0020;
            color: #ffcc00;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 11px;
            display: inline-block;
        }
        .roi-positive { color: #00ff88; font-weight: bold; }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #2f81f7;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;

        dados.signals.forEach(s => {
            if (s.status === "closed") {
                s.status = s.result === "loss" ? "LOSS" : "WIN";
                if (s.roi === undefined || s.roi === null) s.roi = s.pnl_pct;

            if (s.size && !s.lev) s.lev = s.size;

        const wallets = dados.demo_wallets.map(w => ({ id: w.id, label: w.label }));

        const filterPair = document.getElementById('filterPair');
        pairs.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            filterPair.appendChild(opt);
        });

        wallets.forEach(w => {
            const opt = document.createElement('option');
            opt.value = w.id;
            opt.textContent = w.label;
            filterWallet.appendChild(opt);
        });

        // Renderizar carteiras
        function renderWallets() {
            const grid = document.getElementById('walletsGrid');
            grid.innerHTML = '';
            dados.demo_wallets.forEach(w => {
                const card = document.createElement('div');
                card.className = 'wallet-card';
                card.onclick = () => {
                    // Filtra a tabela pela carteira
                    document.getElementById('filterWallet').value = w.id;
                    renderTable();
                };
                card.innerHTML = `
                    <div class="wallet-header">
                        <span class="wallet-emoji">${w.emoji}</span>
                        <span class="wallet-name" style="color: ${w.color}">${w.label}</span>
                    </div>

                    <div class="wallet-detail">ROI: <span style="color:${w.pnl_pct >= 0 ? '#00ff88' : '#ff3e3e'}">${w.pnl_pct >= 0 ? '+' : ''}${w.pnl_pct.toFixed(2)}%</span></div>
                    <div class="wallet-detail">Trades fechados: ${w.trades_fechados}</div>
                    <div class="wallet-perfil">${w.perfil}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Renderizar tabela com filtros
        function renderTable() {
            const pair = document.getElementById('filterPair').value;
            const dir = document.getElementById('filterDir').value;
            const status = document.getElementById('filterStatus').value;
            const wallet = document.getElementById('filterWallet').value;

            const filtered = dados.signals.filter(s => {
                if (pair !== 'all' && s.pair !== pair) return false;
                if (dir !== 'all' && s.dir !== dir) return false;
                if (status !== 'all') {
                    if (status === 'WIN' && s.status !== 'WIN') return false;
                    if (status === 'LOSS' && s.status !== 'LOSS') return false;
                    if (status === 'OPEN' && s.status !== 'OPEN') return false;
                }
                if (wallet !== 'all' && s.wallet !== wallet) return false;
                return true;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            filtered.forEach(s => {
                const tr = document.createElement('tr');
                const dataStr = s.date ? new Date(s.date).toLocaleString('pt-BR') : s.date || '';
                const entrada = s.entry?.toLocaleString('pt-BR', {minimumFractionDigits:2}) || '';
                const saida = s.exit?.toLocaleString('pt-BR', {minimumFractionDigits:2}) || '';
                const roi = s.roi !== null && s.roi !== undefined ? s.roi.toFixed(2) + '%' : '-';
                const statusClass = s.status === 'WIN' ? 'badge-win' : (s.status === 'LOSS' ? 'badge-loss' : 'badge-open');
                const statusText = s.status === 'WIN' ? 'WIN' : (s.status === 'LOSS' ? 'LOSS' : 'OPEN');
                const walletInfo = dados.demo_wallets.find(w => w.id === s.wallet) || { label: s.wallet, emoji: '' };

                tr.innerHTML = `
                    <td>${dataStr}</td>
                    <td><strong>${s.pair}</strong></td>
                    <td>${s.dir}</td>
                    <td>$${entrada}</td>
                    <td>$${saida}</td>
                    <td class="${s.roi >= 0 ? 'roi-positive' : 'roi-negative'}">${roi}</td>
                    <td><span class="${statusClass}">${statusText}</span></td>
                    <td>${s.lev || s.size || '-'}</td>
                    <td>${walletInfo.emoji} ${walletInfo.label}</td>
                    <td style="max-width:200px; white-space:normal;">${s.note || s.reason || ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        window.resetFilters = function() {
            document.getElementById('filterPair').value = 'all';
            document.getElementById('filterDir').value = 'all';
            document.getElementById('filterStatus').value = 'all';
            document.getElementById('filterWallet').value = 'all';
            renderTable();
        };

        // Event listeners
        document.getElementById('filterPair').addEventListener('change', renderTable);
        document.getElementById('filterDir').addEventListener('change', renderTable);
        document.getElementById('filterStatus').addEventListener('change', renderTable);
        document.getElementById('filterWallet').addEventListener('change', renderTable);

        renderWallets();
        renderTable();
    </script>
