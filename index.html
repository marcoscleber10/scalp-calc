<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hyperliquid Metals & Oil - Mestre do Scalping Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header com botão copiar */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .copy-btn {
            background: linear-gradient(135deg, #2c3e50, #1a2632);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn:hover {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255,215,0,0.5);
        }

        /* Cards de ativos */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .asset-card {
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .asset-card.loading {
            opacity: 0.6;
            position: relative;
        }

        .asset-card.loading::after {
            content: "⏳ CARREGANDO...";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
        }

        .asset-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,215,0,0.3);
            padding-bottom: 10px;
        }

        .asset-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .asset-symbol {
            font-size: 0.9rem;
            color: #ffd700;
        }

        .price-container {
            margin: 15px 0;
        }

        .current-price {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        .price-change {
            font-size: 1rem;
            margin-left: 10px;
        }

        .positive {
            color: #00ff88;
        }

        .negative {
            color: #ff4444;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
            font-size: 0.85rem;
        }

        .stat-item {
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            color: #aaa;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .stat-value {
            font-weight: bold;
            color: #ffd700;
        }

        .session-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 10px;
        }

        .session-active {
            background: #00ff8822;
            border: 1px solid #00ff88;
            color: #00ff88;
        }

        .session-inactive {
            background: #ff444422;
            border: 1px solid #ff4444;
            color: #ff4444;
        }

        /* Gráfico simplificado */
        .chart-container {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .chart-title {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #ffd700;
        }

        .candle-chart {
            display: flex;
            align-items: flex-end;
            height: 200px;
            gap: 4px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 40px;
        }

        .candle-body {
            width: 8px;
            background: #ffd700;
            border-radius: 2px;
            transition: height 0.3s;
        }

        .candle-body.green {
            background: #00ff88;
        }

        .candle-body.red {
            background: #ff4444;
        }

        .candle-price {
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* Alarme */
        .alarm-section {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }

        .alarm-input {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .alarm-input input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffd700;
            background: #0a0a0a;
            color: white;
            font-family: monospace;
        }

        .alarm-input select {
            padding: 12px;
            border-radius: 8px;
            background: #0a0a0a;
            color: white;
            border: 1px solid #ffd700;
        }

        .alarm-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .alarm-list {
            margin-top: 15px;
        }

        .alarm-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(255,215,0,0.1);
            margin: 5px 0;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .delete-alarm {
            color: #ff4444;
            cursor: pointer;
            margin-left: 10px;
        }

        /* Modal de confirmação */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 20px;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
            border: 1px solid #ffd700;
        }

        .modal-content pre {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            color: #ffd700;
            font-size: 24px;
        }

        @media (max-width: 768px) {
            .current-price {
                font-size: 1.5rem;
            }
            .asset-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 MESTRE DO SCALPING PRO | HYPERLIQUID</h1>
            <button class="copy-btn" onclick="copiarCodigo()">
                📋 COPIAR CÓDIGO COMPLETO
            </button>
        </div>

        <div class="assets-grid" id="assetsGrid"></div>

        <div class="chart-container">
            <div class="chart-title">📊 GRÁFICO DE VELAS (SIMULADO) - ÚLTIMAS 24H</div>
            <div class="candle-chart" id="candleChart"></div>
        </div>

        <div class="alarm-section">
            <h3>⏰ ALARME DE PREÇO</h3>
            <div class="alarm-input">
                <select id="alarmAsset">
                    <option value="XAUUSD">OURO (XAU/USD)</option>
                    <option value="XAGUSD">PRATA (XAG/USD)</option>
                    <option value="WTIUSD">PETRÓLEO (WTI/USD)</option>
                </select>
                <input type="number" id="alarmPrice" placeholder="Preço alvo (ex: 4500)" step="any">
                <select id="alarmCondition">
                    <option value="above">ACIMA DE</option>
                    <option value="below">ABAIXO DE</option>
                </select>
                <button onclick="adicionarAlarme()">➕ ADICIONAR ALARME</button>
            </div>
            <div class="alarm-list" id="alarmList"></div>
        </div>
    </div>

    <div id="codeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <h3>Código HTML Completo</h3>
            <pre id="codigoCompleto"></pre>
            <button onclick="copiarTextoModal()" style="margin-top:15px; padding:10px; background:#ffd700; border:none; border-radius:8px; cursor:pointer;">📋 COPIAR CÓDIGO</button>
        </div>
    </div>

    <script>
        // Dados dos ativos com Hyperliquid
        const assets = {
            XAUUSD: {
                name: "OURO",
                symbol: "XAU/USD",
                currentPrice: 4528.50,
                change24h: 1.25,
                high24h: 4562.30,
                low24h: 4495.20,
                volume: "2.34M",
                session: "Londres",
                sessionActive: true,
                volatility: "MÉDIA"
            },
            XAGUSD: {
                name: "PRATA",
                symbol: "XAG/USD",
                currentPrice: 32.85,
                change24h: -0.45,
                high24h: 33.12,
                low24h: 32.65,
                volume: "845K",
                session: "NY (Pico)",
                sessionActive: true,
                volatility: "ALTA"
            },
            WTIUSD: {
                name: "PETRÓLEO",
                symbol: "WTI/USD",
                currentPrice: 78.42,
                change24h: 2.15,
                high24h: 79.30,
                low24h: 77.15,
                volume: "5.67M",
                session: "EURO",
                sessionActive: false,
                volatility: "ALTA"
            }
        };

        let alarms = JSON.parse(localStorage.getItem('priceAlarms')) || [];
        let updateInterval;

        // Simular atualização de preços via Hyperliquid
        function atualizarPrecosHyperliquid() {
            for (let key in assets) {
                const asset = assets[key];
                // Simula variação de preço baseada na volatilidade
                let variacao = 0;
                if (asset.volatility === "ALTA") {
                    variacao = (Math.random() - 0.5) * 0.8;
                } else {
                    variacao = (Math.random() - 0.5) * 0.3;
                }
                
                let novoPreco = asset.currentPrice * (1 + variacao / 100);
                // Garante que não fique muito fora do range
                if (key === 'XAUUSD') novoPreco = Math.min(4650, Math.max(4400, novoPreco));
                if (key === 'XAGUSD') novoPreco = Math.min(34.5, Math.max(31.5, novoPreco));
                if (key === 'WTIUSD') novoPreco = Math.min(82, Math.max(75, novoPreco));
                
                const oldPrice = asset.currentPrice;
                asset.currentPrice = parseFloat(novoPreco.toFixed(2));
                asset.change24h = parseFloat(((asset.currentPrice - oldPrice) / oldPrice * 100).toFixed(2));
                
                // Verificar alarmes
                verificarAlarmes(key, asset.currentPrice);
            }
            renderizarCards();
            renderizarGrafico();
        }

        function verificarAlarmes(assetKey, currentPrice) {
            const assetAlarms = alarms.filter(a => a.asset === assetKey);
            assetAlarms.forEach(alarm => {
                let disparado = false;
                if (alarm.condition === 'above' && currentPrice >= alarm.price) disparado = true;
                if (alarm.condition === 'below' && currentPrice <= alarm.price) disparado = true;
                
                if (disparado) {
                    // Notificação visual
                    alert(`🚨 ALARME DISPARADO!\n${assets[assetKey].name} (${assets[assetKey].symbol})\nPreço: $${currentPrice}\nCondição: ${alarm.condition === 'above' ? 'ACIMA' : 'ABAIXO'} de $${alarm.price}`);
                    
                    // Remover alarme disparado
                    alarms = alarms.filter(a => !(a.asset === assetKey && a.price === alarm.price && a.condition === alarm.condition));
                    localStorage.setItem('priceAlarms', JSON.stringify(alarms));
                    renderizarAlarmes();
                }
            });
        }

        function renderizarCards() {
            const grid = document.getElementById('assetsGrid');
            if (!grid) return;
            
            grid.innerHTML = '';
            for (let [key, asset] of Object.entries(assets)) {
                const changeClass = asset.change24h >= 0 ? 'positive' : 'negative';
                const changeSymbol = asset.change24h >= 0 ? '▲' : '▼';
                
                const sessionClass = asset.sessionActive ? 'session-active' : 'session-inactive';
                const sessionText = asset.sessionActive ? '📈 SESSÃO ATIVA' : '⏸️ FORA DO HORÁRIO';
                
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="asset-header">
                        <span class="asset-name">${asset.name}</span>
                        <span class="asset-symbol">${asset.symbol}</span>
                    </div>
                    <div class="price-container">
                        <span class="current-price">$${asset.currentPrice.toFixed(2)}</span>
                        <span class="price-change ${changeClass}">${changeSymbol} ${Math.abs(asset.change24h)}%</span>
                    </div>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-label">HIGH 24H</div>
                            <div class="stat-value">$${asset.high24h}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">LOW 24H</div>
                            <div class="stat-value">$${asset.low24h}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">VOLUME</div>
                            <div class="stat-value">${asset.volume}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">VOLATILIDADE</div>
                            <div class="stat-value">${asset.volatility}</div>
                        </div>
                    </div>
                    <div class="session-badge ${sessionClass}">${sessionText}</div>
                    <div style="margin-top: 12px; font-size: 0.7rem; color: #aaa;">
                        🔄 Atualizado via Hyperliquid • ${new Date().toLocaleTimeString()}
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function renderizarGrafico() {
            const chartContainer = document.getElementById('candleChart');
            if (!chartContainer) return;
            
            // Simular dados de velas para os últimos 24 períodos
            let prices = [];
            let basePrice = assets.XAUUSD.currentPrice;
            
            for (let i = 0; i < 24; i++) {
                let variation = (Math.random() - 0.5) * 15;
                let price = basePrice + variation;
                prices.push(price);
            }
            
            chartContainer.innerHTML = '';
            prices.forEach((price, idx) => {
                const isGreen = price > (idx > 0 ? prices[idx-1] : price);
                const candle = document.createElement('div');
                candle.className = 'candle';
                const height = 40 + (price - Math.min(...prices)) / (Math.max(...prices) - Math.min(...prices)) * 120;
                candle.innerHTML = `
                    <div class="candle-body ${isGreen ? 'green' : 'red'}" style="height: ${height}px;"></div>
                    <div class="candle-price">$${price.toFixed(0)}</div>
                `;
                chartContainer.appendChild(candle);
            });
        }

        function renderizarAlarmes() {
            const alarmList = document.getElementById('alarmList');
            if (!alarmList) return;
            
            if (alarms.length === 0) {
                alarmList.innerHTML = '<div style="text-align:center; color:#666; padding:20px;">Nenhum alarme definido</div>';
                return;
            }
            
            alarmList.innerHTML = '';
            alarms.forEach((alarm, idx) => {
                const assetName = assets[alarm.asset]?.name || alarm.asset;
                const conditionText = alarm.condition === 'above' ? 'ACIMA' : 'ABAIXO';
                const alarmDiv = document.createElement('div');
                alarmDiv.className = 'alarm-item';
                alarmDiv.innerHTML = `
                    <span>🔔 ${assetName} - ${conditionText} de $${alarm.price}</span>
                    <span class="delete-alarm" onclick="removerAlarme(${idx})">🗑️ REMOVER</span>
                `;
                alarmList.appendChild(alarmDiv);
            });
        }

        function adicionarAlarme() {
            const asset = document.getElementById('alarmAsset').value;
            const price = parseFloat(document.getElementById('alarmPrice').value);
            const condition = document.getElementById('alarmCondition').value;
            
            if (isNaN(price) || price <= 0) {
                alert('Por favor, insira um preço válido!');
                return;
            }
            
            alarms.push({ asset, price, condition });
            localStorage.setItem('priceAlarms', JSON.stringify(alarms));
            renderizarAlarmes();
            document.getElementById('alarmPrice').value = '';
            
            // Feedback visual
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '✅ ADICIONADO!';
            setTimeout(() => btn.innerText = originalText, 1500);
        }

        function removerAlarme(index) {
            alarms.splice(index, 1);
            localStorage.setItem('priceAlarms', JSON.stringify(alarms));
            renderizarAlarmes();
        }

        // Função para copiar código
        function copiarCodigo() {
            const codigo = document.documentElement.outerHTML;
            const modal = document.getElementById('codeModal');
            const pre = document.getElementById('codigoCompleto');
            pre.textContent = codigo;
            modal.style.display = 'flex';
        }
        
        function copiarTextoModal() {
            const pre = document.getElementById('codigoCompleto');
            const texto = pre.textContent;
            navigator.clipboard.writeText(texto).then(() => {
                alert('✅ Código copiado com sucesso!');
            }).catch(() => {
                alert('❌ Erro ao copiar. Selecione manualmente.');
            });
        }
        
        function fecharModal() {
            document.getElementById('codeModal').style.display = 'none';
        }
        
        // Inicialização
        function init() {
            renderizarCards();
            renderizarGrafico();
            renderizarAlarmes();
            
            // Atualização automática a cada 3 segundos (simulando feed Hyperliquid)
            updateInterval = setInterval(() => {
                atualizarPrecosHyperliquid();
            }, 3000);
            
            // Fechar modal ao clicar fora
            window.onclick = function(event) {
                const modal = document.getElementById('codeModal');
                if (event.target === modal) {
                    modal.style.display = 'none';
                }
            };
        }
        
        // Limpar intervalo ao descarregar
        window.addEventListener('beforeunload', () => {
            if (updateInterval) clearInterval(updateInterval);
        });
        
        init();
    </script>
</body>
</html>
