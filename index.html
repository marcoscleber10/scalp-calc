<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro - v.Premium</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e;
            --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        
        .card { 
            background: var(--card); padding: 25px; border-radius: 28px; 
            width: 100%; max-width: 420px; border: 1px solid #30363d; 
            position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        /* 1. BOLINHA DO ROBÔ */
        .robot-indicator { 
            position: absolute; top: 18px; right: 20px; 
            display: flex; align-items: center; font-size: 9px; 
            font-weight: 900; color: #fff; letter-spacing: 0.5px;
        }
        .led { 
            width: 9px; height: 9px; background: var(--green); 
            border-radius: 50%; margin-right: 6px; 
            box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        h4 { color: #fff; font-size: 10px; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; opacity: 0.8; }
        
        /* SELETOR REFORMULADO */
        select { 
            width: 100%; background: #0d1117; color: white; border: 1px solid #30363d; 
            padding: 14px; border-radius: 15px; margin-bottom: 15px; font-weight: bold;
        }

        .price { font-size: 42px; font-weight: 800; color: var(--green); text-align: center; margin-bottom: 20px; font-family: monospace; }

        /* SINAIS EM BLOCOS */
        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .status-box { background: #0d1117; padding: 12px 5px; border-radius: 12px; border: 1px solid #21262d; text-align: center; }
        .status-label { font-size: 7px; color: var(--text); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .status-val { font-size: 10px; font-weight: bold; }

        #chart_container { width: 100%; height: 260px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #30363d; overflow: hidden; }

        /* CALCULADORA */
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { background: #0d1117; padding: 8px; border-radius: 12px; border: 1px solid #21262d; }
        .input-group label { font-size: 7px; color: var(--text); display: block; margin-bottom: 2px; }
        .input-group input { background: transparent; border: none; color: white; width: 100%; font-size: 12px; font-weight: bold; }
        
        .btn-calc { 
            width: 100%; background: var(--green); color: #000; border: none; 
            padding: 16px; border-radius: 15px; font-weight: 900; 
            cursor: pointer; margin-bottom: 20px; font-size: 13px;
        }
