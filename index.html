<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; }
        .card.desktop-mode { max-width: 95%; }
        h4 { color: var(--text); font-size: 10px; margin: 0 0 15px 0; text-transform: uppercase; }
        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; }
        .time-selector { display: flex; gap: 5px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 8px; border-radius: 6px; font-size: 9px; font-weight: bold; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: white; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .price { font-size: 32px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 8px; border-radius: 8px; font-size: 9px; font-weight: bold; border-bottom: 3px solid #30363d; }
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d; background: #000; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-calc { width: 100%; padding: 14px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .res { margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d; display: none; }
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .proj-btn { background: #21262d; color: var(--text); border: 1px solid #30363d; padding: 8px; border-radius: 6px; font-size: 10px; text-decoration: none; text-align: center; }
        .ad-box { margin-top: 20px; padding: 12px; background: #1c2128; border-radius: 10px; border: 1px solid #ffcc0055; }
        .btn-ad { display: block; background: var(--gold); color: #000; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 8px; text-align: center; }
        .mkt-table { width: 100%; font-size: 9px; margin-top: 15px; border-collapse: collapse; text-align: left; color: var(--text); }
        .mkt-table td { padding: 5px 0; border-bottom: 1px solid #21262d; }
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ MODO COMPUTADOR</button>
    <div class="time-selector">
        <button class="time-btn active" onclick="setTF('1', this)">⚡ SCALP (1m)</button>
        <button class="time-btn" onclick="setTF('15', this)">🔭 DAY (15m)</button>
    </div>
    <select id="pair" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance BTC</option>
        <option value="BINANCE:ETHUSDT">Binance ETH</option>
        <option value="TVC:GOLD">Ouro (XAU)</option>
        <option value="TVC:USOIL">Petróleo (WTI)</option>
    </select>
    <div class="price" id="pText">$--.---</div>
    <div class="status-grid">
        <div id="sBox" class="status-bar">SINAL: ...</div>
        <div id="fBox" class="status-bar">FILTRO: ...</div>
    </div>
    <div id="chart_container"></div>
    <div class="inputs-grid">
        <input type="number" id="cap" value="300">
        <input type="number" id="lv" value="10">
        <input type="number" id="tp" value="1.0">
        <input type="number" id="sl" value="1.0">
    </div>
    <button class="btn-calc" onclick="calc()">CALCULAR ALVOS</button>
    <div id="res" class="res">
        <div style="color:var(--green)">TP: <span id="rTP"></span></div>
        <div style="color:var(--red)">SL: <span id="rSL"></span></div>
    </div>
    <div class="projects-grid">
        <a href="#" class="proj-btn">Dash 97</a><a href="#" class="proj-btn">CombustAI</a>
        <a href="#" class="proj-btn">Dash 75</a><a href="#" class="proj-btn">Invest</a>
    </div>
    <div class="ad-box">
        <span style="color:var(--gold); font-size:10px; font-weight:bold;">📺 ATMOS IPTV</span>
        <a href="https://wa.me/5597991916621" class="btn-ad">TESTE GRÁTIS</a>
    </div>
    <table class="mkt-table">
        <tr><td>🌏 Ásia</td><td>21h - 05h</td><td style="color:var(--gold)">🟡 Médio</td></tr>
        <tr><td>🥇 Ouro/WTI</td><td>10h - 16h</td><td style="color:var(--green)">🟢 Pico</td></tr>
    </table>
</div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0, hist = [], isDesk = false, tf = "1", ws = null;
    function setTF(t, b) { tf = t; document.querySelectorAll('.time-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); initApp(); }
    function toggleMode() { isDesk = !isDesk; document.getElementById('mainCard').classList.toggle('desktop-mode', isDesk); initApp(); }
    function initApp() {
        const s = document.getElementById('pair').value;
        document.getElementById('chart_container').innerHTML = '';
        new TradingView.widget({ "autosize": true, "symbol": s, "interval": tf, "theme": "dark", "container_id": "chart_container", "hide_top_toolbar": !isDesk });
        if(ws) ws.close();
        let p = s.split(':')[1].toLowerCase();
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${(p.includes('gold')||p.includes('oil'))?'btcusdt':p}@ticker`);
        ws.onmessage = (e) => {
            const d = JSON.parse(e.data); price = parseFloat(d.c);
            document.getElementById('pText').innerText = `$ ${price.toFixed(2)}`;
            const box = document.getElementById('sBox');
            if (new Date().getHours() >= 21 || new Date().getHours() <= 4) { box.innerText = "🟡 LATERAL"; box.style.borderColor = "var(--gold)"; }
            else { box.innerText = "🔥 OPORTUNIDADE"; box.style.borderColor = "var(--green)"; }
            hist.push(price); if(hist.length > 10) hist.shift();
            document.getElementById('fBox').innerText = price > hist[0] ? "🚀 COMPRA" : "📉 VENDA";
        };
    }
    function calc() {
        const t = parseFloat(document.getElementById('tp').value), s = parseFloat(document.getElementById('sl').value);
        document.getElementById('rTP').innerText = `$ ${(price * (1 + t/100)).toFixed(2)}`;
        document.getElementById('rSL').innerText = `$ ${(price * (1 - s/100)).toFixed(2)}`;
        document.getElementById('res').style.display = 'block';
    }
    initApp();
</script>
</body>
</html>
