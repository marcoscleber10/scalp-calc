<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow-x: hidden; }
        
        /* Ajuste de Tamanho: Agora ocupa quase a tela toda no celular */
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 92%; max-width: 450px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card.desktop-mode { max-width: 95%; }
        
        h4 { color: var(--text); font-size: 12px; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .time-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 12px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 14px; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
        
        .price { font-size: 38px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; letter-spacing: -1px; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: bold; border-bottom: 3px solid #30363d; text-align: center; position: relative; }
        .status-label { font-size: 9px; color: var(--text); display: block; margin-bottom: 4px; text-transform: uppercase; }

        #chart_container { width: 100%; height: 250px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; }
        
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 10px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 16px; }
        
        .btn-calc { width: 100%; padding: 18px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        
        /* BOTÃO DO ROBÔ - AGORA VISÍVEL */
        .secret-dot { 
            position: fixed; bottom: 25px; right: 20px; width: 45px; height: 45px; 
            background: var(--accent); border-radius: 50%; cursor: pointer; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 2px solid white; opacity: 0.8;
        }

        #authBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,17,23,0.98); z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        #botControl { display: none; margin-top: 20px; padding: 15px; border: 1px dashed var(--green); border-radius: 12px; background: #0d1117; }
        .bot-log { background: #000; color: var(--green); font-family: monospace; font-size: 11px; padding: 10px; height: 80px; overflow-y: auto; border-radius: 4px; margin-top: 10px; text-align: left; border: 1px solid #1f2428; }

        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 12px; border-radius: 6px; font-size: 12px; text-decoration: none; font-weight: bold; text-align: center; }
        
        .ad-container { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1e2227, #161b22); border-radius: 12px; border: 1px solid #ffcc0033; }
        .btn-ad { display: block; background: #ffcc00; color: #000; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-top: 10px; text-align: center;}
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ Modo Computador</button>

    <div class="time-selector">
        <button class="time-btn active" data-t="1" onclick="setTF('1', this)">⚡ SCALP (1m)</button>
        <button class="time-btn" data-t="15" onclick="setTF('15', this)">🔭 DAY TRADE (15m)</button>
    </div>

    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="BINANCE:ETHUSDT">Binance - ETH/USDT</option>
        <option value="BINANCE:SOLUSDT">Binance - SOL/USDT</option>
        <option value="TVC:GOLD">Ouro (XAUUSD)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div class="status-grid">
        <div id="statusBox" class="status-bar"><span class="status-label">SINAL GERAL</span><span id="statusText">...</span></div>
        <div id="rsiBox" class="status-bar"><span class="status-label">FILTRO TÉCNICO</span><span id="rsiText">...</span></div>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Calcular Alvos</button>

    <div id="botControl">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="color:var(--green); font-size:12px; font-weight:bold;">🤖 BOT ATIVO</span>
            <span id="botStatus" style="width:10px; height:10px; background:var(--red); border-radius:50%;"></span>
        </div>
        <button class="btn-calc" style="background:var(--accent); color:white; padding:12px;" onclick="runBot()">ATIVAR EXECUÇÃO</button>
        <div class="bot-log" id="botLog">> Aguardando comando...</div>
    </div>

    <div class="projects-grid">
        <a href="#" class="project-btn">Dash 97</a>
        <a href="#" class="project-btn">CombustAI</a>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 13px; font-weight: bold;">📺 ATMOS IPTV</span>
        <a href="https://wa.me/5597991916621" target="_blank" class="btn-ad">TESTE GRÁTIS</a>
    </div>
</div>

<div class="secret-dot" onclick="showAuth()">
    <span style="color:white; font-size:20px;">⚙️</span>
</div>

<div id="authBox">
    <h3 style="color:var(--green)">ACESSO CORE</h3>
    <input type="password" id="sysPass" placeholder="Senha" style="width:200px; text-align:center;">
    <button class="btn-mode" style="width:200px;" onclick="checkSys()">ENTRAR</button>
    <button onclick="hideAuth()" style="background:none; border:none; color:var(--text); margin-top:15px;">Fechar</button>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0, pricesHistory = [], isDesktop = false, currentTF = "1", activeWS = null;

    function setTF(tf, btn) {
        currentTF = tf;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        initApp();
    }

    function toggleMode() {
        isDesktop = !isDesktop;
        document.getElementById('mainCard').classList.toggle('desktop-mode', isDesktop);
        initApp();
    }

    function initApp() {
        const symbol = document.getElementById('pairSelector').value;
        document.getElementById('chart_container').innerHTML = ''; 
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": currentTF,
            "theme": "dark", "container_id": "chart_container", "locale": "br"
        });
        
        if(activeWS) activeWS.close();
        let pair = symbol.split(':')[1].toLowerCase();
        activeWS = new WebSocket(`wss://stream.binance.com:9443/ws/${pair === 'gold' ? 'btcusdt' : pair}@ticker`);
        activeWS.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toLocaleString('en-US')}`;
            
            const box = document.getElementById('statusBox'), txt = document.getElementById('statusText');
            if (Math.floor(price * 100) % 2 === 0) {
                txt.innerText = "🔥 SINAL ALTO"; box.style.borderBottomColor = "var(--green)";
            } else {
                txt.innerText = "⚠️ NEUTRO"; box.style.borderBottomColor = "var(--red)";
            }
        };
    }

    function showAuth() { document.getElementById('authBox').style.display = 'flex'; }
    function hideAuth() { document.getElementById('authBox').style.display = 'none'; }
    function checkSys() {
        if(document.getElementById('sysPass').value === "1234") {
            hideAuth(); document.getElementById('botControl').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } else { alert("Senha incorreta"); }
    }
    function runBot() {
        document.getElementById('botStatus').style.background = "var(--green)";
        document.getElementById('botLog').innerHTML += "<br>> Execução Hyperliquid Iniciada...";
    }

    initApp();
</script>
</body>
</html>
