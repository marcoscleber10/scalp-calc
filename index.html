<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h4 { color: var(--text); font-size: 11px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 10px; font-family: monospace; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }

        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d; background: #000; }

        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; margin-bottom: 15px; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; display: block; margin-bottom: 4px; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; font-size: 14px; }

        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; margin-bottom: 20px; }
        
        /* RESULTADOS DETALHADOS */
        .res { margin-bottom: 20px; padding: 15px; background: #0d1117; border-radius: 10px; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }

        /* PUBLICIDADE ATMOS */
        .ad-section { margin-top: 10px; border-top: 1px solid #30363d; padding-top: 15px; }
        .ad-link { text-decoration: none; display: block; border-radius: 12px; overflow: hidden; transition: transform 0.3s; }
        .ad-link:hover { transform: scale(1.02); }
        .ad-img { width: 100%; display: block; border-radius: 12px; border: 1px solid #444; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping</h4>
    
    <select id="exchange" onchange="initApp()" style="width: 100%; background: #21262d; color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #30363d;">
        <option value="BINANCE:BTCUSDT">Binance (Quantfury)</option>
        <option value="OKX:BTCUSDT">OKX (Real-time)</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid (BTC/USDC)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>
    <div id="statusBox" class="status-bar">PROCESSANDO...</div>
    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="1.0" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Ver Meus Alvos Agora</button>

    <div id="results" class="res">
        <div class="res-item"><span>🟢 Lucro Alvo:</span> <span id="resTP" style="color:var(--green)"></span></div>
        <div class="res-item"><span>💵 Valor Lucro:</span> <span id="valTP" style="color:var(--green)"></span></div>
        <div class="res-item"><span>🛑 Stop Loss:</span> <span id="resSL" style="color:var(--red)"></span></div>
        <div class="res-item"><span>💸 Valor Perda:</span> <span id="valSL" style="color:var(--red)"></span></div>
    </div>

    <div class="ad-section">
        <a href="https://wa.me/5597991916621?text=Olá!+Vi+o+anúncio+no+Mestre+do+Scalping+e+quero+testar+a+Atmos" target="_blank" class="ad-link">
            <img src="https://i.ibb.co/Xf8R0f6S/atmos-banner.jpg" class="ad-img" alt="Publicidade Atmos">
        </a>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;

    function initApp() {
        if (ws) ws.close();
        const symbol = document.getElementById('exchange').value;
        
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "1", "theme": "dark",
            "style": "1", "locale": "br", "container_id": "chart_container",
            "hide_top_toolbar": true, "hide_legend": true
        });

        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            const box = document.getElementById('statusBox');
            if (price % 2 === 0) {
                box.innerText = "🔥 OPORTUNIDADE DE COMPRA";
                box.className = "status-bar buy";
            } else {
                box.innerText = "⚠️ HORA DE VENDER / AGUARDAR";
                box.className = "status-bar sell";
            }
        };
    }

    function calc() {
        if (price === 0) return;
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tpPct = parseFloat(document.getElementById('tpP').value);
        const slPct = parseFloat(document.getElementById('slP').value);

        const totalSize = cap * lev;
        const profit = totalSize * (tpPct / 100);
        const loss = totalSize * (slPct / 100);

        document.getElementById('resTP').innerText = `$ ${(price * (1 + (tpPct / 100))).toFixed(2)}`;
        document.getElementById('valTP').innerText = `+ $ ${profit.toFixed(2)} (+${tpPct}%)`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - (slPct / 100))).toFixed(2)}`;
        document.getElementById('valSL').innerText = `- $ ${loss.toFixed(2)} (-${slPct}%)`;
        
        document.getElementById('results').style.display = 'block';
    }

    initApp();
</script>
</body>
</html>
