<style>
    /* Estilo da Bolinha Secreta */
    .secret-trigger {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 12px;
        height: 12px;
        background: var(--green);
        border-radius: 50%;
        cursor: pointer;
        opacity: 0.3; /* Quase invisível */
        z-index: 9999;
        transition: opacity 0.3s;
    }
    .secret-trigger:hover { opacity: 1; box-shadow: 0 0 10px var(--green); }

    /* Painel do Robô (Invisível por padrão) */
    #robotPanel {
        display: none; 
        margin-top: 20px;
        padding: 15px;
        background: #1c2128;
        border: 1px dashed var(--green);
        border-radius: 12px;
    }
    .robot-status { color: var(--green); font-family: monospace; font-size: 11px; text-align: left; }
    
    /* Overlay da Senha */
    #passwordOverlay {
        display: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        z-index: 10000;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }
</style>

<div id="robotPanel">
    <h4 style="color:var(--green); margin-bottom:10px;">🤖 AUTOMAÇÃO HYPERLIQUID</h4>
    <div class="robot-status">
        > STATUS: AGUARDANDO SINAL...<br>
        > API: CONNECTED (AGENT WALLET)<br>
        > ESTRATÉGIA: SCALPING GRID
    </div>
    <button class="btn-calc" style="margin-top:10px; background:var(--accent); color:white;" onclick="alert('Iniciando Automação...')">ATIVAR ROBÔ</button>
</div>

<div class="secret-trigger" onclick="showPassPrompt()"></div>

<div id="passwordOverlay">
    <h3 style="color:var(--green)">ACESSO RESTRITO</h3>
    <input type="password" id="secretPass" placeholder="Digite a Senha" style="width:200px; text-align:center;">
    <button class="btn-mode" style="width:200px;" onclick="checkPass()">ENTRAR</button>
</div>

<script>
    // Função para mostrar o campo de senha
    function showPassPrompt() {
        document.getElementById('passwordOverlay').style.display = 'flex';
        document.getElementById('secretPass').focus();
    }

    // Função para verificar senha (defina sua senha aqui)
    function checkPass() {
        const pass = document.getElementById('secretPass').value;
        if(pass === "1234") { // TROQUE "1234" PELA SUA SENHA
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('robotPanel').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight); // Rola para o robô
        } else {
            alert("Senha Incorreta!");
            document.getElementById('passwordOverlay').style.display = 'none';
        }
    }
</script>
