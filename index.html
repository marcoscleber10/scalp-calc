<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro - V3</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --green: #00ff88;
            --red: #ff3e3e;
            --text: #8b949e;
            --accent: #2f81f7;
            --gold: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: var(--card); padding: 24px; border-radius: 24px; width: 100%; max-width: 420px; border: 1px solid #30363d; box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: all 0.3s; }
        .card.desktop-mode { max-width: 95%; }
        h4 { color: var(--text); font-size: 12px; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px dashed #30363d; }
        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; }
        .time-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 12px 5px; border-radius: 40px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 15px; border-radius: 40px; margin-bottom: 20px; font-size: 14px; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%239aa4b3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>"); background-repeat: no-repeat; background-position: right 18px center; }
        .price { font-size: 38px; font-weight: 800; color: var(--green); text-align: center; margin-bottom: 15px; font-family: 'Courier New', monospace; }
        
        /* GRID DE 3 SINAIS CORRIGIDO */
        .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .status-bar { background: #0f141c; padding: 10px 2px; border-radius: 15px; border: 1px solid #2a3340; text-align: center; border-bottom: 3px solid #30363d; }
        .status-label { font-size: 8px; color: var(--text); text-transform: uppercase; display: block; margin-bottom: 4px; }
        .status-value { font-size: 10px; font-weight: bold; display: block; }

        #chart_container { width: 100%; height: 250px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 2px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 15px; font-size: 13px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 40px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 15px; margin-top: 5px; }
        .res { margin-top: 15px; padding: 15px; background: #0f151d; border-radius: 20px; display: none; border: 1px solid #2a3440; font-size: 14px; }
        .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 20px; padding-top: 15px; border-top: 1px solid #333; }
        .project-btn { background: #1a222c; color: #c9d1d9; border: 1px solid #30363d; padding: 10px 2px; border-radius: 20px; font-size: 10px; text-decoration: none; text-align: center; display: block; }
        .ad-container { margin-top: 20px; padding: 12px; background: #161e28; border-radius: 25px; border: 1px solid #ffcc0040; text-align: center; }
        .floating-ball { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--green); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: 900; cursor: pointer; z-index: 999; border: 3px solid white; box-shadow: 0 0 20px #00ff8880; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index: 1000; }
        .modal-content { background:#161b22; padding:25px; border-radius:25px; width:90%; max-width:400px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <h4>⚡ MESTRE DO SCALPING PRO ⚡</h4>
        <button class="btn-mode" onclick="toggleMode()">🖥️ MODO COMPUTADOR</button>

        <div class="time-selector">
            <button class="time-btn active" onclick="setTF('1', this)">⚡ 1m</button>
            <button class="time-btn" onclick="setTF('5', this)">🔥 5m</button>
            <button class="time-btn" onclick="setTF('15', this)">🔭 15m</button>
        </div>

        <select id="pairSelector" onchange="initChart()">
            <option value="BINANCE:BTCUSDT">₿ BTC/USDT</option>
            <option value="BINANCE:SOLUSDT">◎ SOL/USDT</option>
            <option value="BINANCE:ETHUSDT">⟠ ETH/USDT</option>
            <option value="TVC:GOLD">🥇 OURO (XAU)</option>
        </select>

        <div class="price" id="priceText">$ 0.00</div>

        <div class="status-grid">
            <div id="box1" class="status-bar">
                <span class="status-label">SINAL GERAL</span>
                <span class="status-value" id="s1">AGUARDAR</span>
            </div>
            <div id="box2" class="status-bar">
                <span class="status-label">FILTRO</span>
                <span class="status-value" id="s2">ANALISANDO</span>
            </div>
            <div id="box3" class="status-bar">
                <span class="status-label">OPÇÃO 3</span>
                <span class="status-value" id="s3">NEUTRO</span>
            </div>
        </div>

        <div id="chart_container"></div>

        <div class="inputs-grid">
            <div><label>Capital $</label><input type="number" id="capital" value="100"></div>
            <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
            <div><label>Gain %</label><input type="number" id="tpP" value="1.0"></div>
            <div><label>Stop %</label><input type="number" id="slP" value="1.0"></div>
        </div>

        <button class="btn-calc" onclick="calc()">📊 CALCULAR ALVOS</button>

        <div id="results" class="res">
            <div style="display:flex; justify-content:space-between;"><span>🟢 ALVO (TP):</span> <span id="resTP" style="color:var(--green);"></span></div>
            <div style="display:flex; justify-content:space-between; margin-top:8px;"><span>🔴 STOP (SL):</span> <span id="resSL" style="color:var(--red);"></span></div>
        </div>

        <div class="projects-grid">
            <a href="https://site-557591544835-620634786284.southamerica-east1.run.app" class="project-btn" target="_blank">Sinais</a>
            <a href="https://site-combustai-620634786284.southamerica-east1.run.app" class="project-btn" target="_blank">CombustAI</a>
            <a href="https://site-559791916621-620634786284.southamerica-east1.run.app" class="project-btn" target="_blank">DCA</a>
            <a href="https://pepinometro-620634786284.southamerica-east1.run.app" class="project-btn" target="_blank">Pepinômetro</a>
            <a href="https://historia-copas-620634786284.southamerica-east1.run.app" class="project-btn" target="_blank">Copas</a>
            <a href="https://investopcao.culturabuilder.com" class="project-btn" target="_blank">Opção</a>
        </div>

        <div class="ad-container">
            <span style="color:var(--gold); font-weight:800; font-size:14px;">📺 ATMOS IPTV</span><br>
            <a href="https://wa.me/5597991916621" target="_blank" style="color:white; font-size:11px;">SOLICITAR TESTE GRÁTIS</a>
        </div>
    </div>

    <div class="floating-ball" onclick="openPass()">🔓</div>

    <div id="passModal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--gold); text-align:center; margin-bottom:15px;">ACESSO ROBÔ</h2>
            <input type="password" id="senha" placeholder="Senha" style="text-align:center; margin-bottom:15px;">
            <button class="btn-calc" onclick="validar()">ENTRAR</button>
            <button onclick="document.getElementById('passModal').style.display='none'" style="width:100%; background:none; border:none; color:var(--text); margin-top:10px; cursor:pointer;">Fechar</button>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let price = 0;
        let hist = [];
        let isDesk = false;
        let tf = "1";
        let socket = null;

        function setTF(time, btn) {
            tf = time;
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            initChart();
        }

        function toggleMode() {
            isDesk = !isDesk;
            document.getElementById('mainCard').classList.toggle('desktop-mode', isDesk);
            document.getElementById('chart_container').style.height = isDesk ? "500px" : "250px";
            initChart();
        }

        function initChart() {
            const sym = document.getElementById('pairSelector').value;
            new TradingView.widget({
                "autosize": true, "symbol": sym, "interval": tf, "theme": "dark", "style": "1",
                "locale": "br", "container_id": "chart_container", "hide_top_toolbar": !isDesk
            });

            if(socket) socket.close();
            let pair = sym.split(':')[1].toLowerCase();
            socket = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                price = parseFloat(data.c);
                document.getElementById('priceText').innerText = `$ ${price.toLocaleString()}`;
                hist.push(price);
                if(hist.length > 50) hist.shift();

                // LÓGICA DOS 3 SINAIS
                atualizarSinais();
            };
        }

        function atualizarSinais() {
            // SINAL 1: Par/Ímpar (Rapidez)
            const s1 = document.getElementById('s1');
            const b1 = document.getElementById('box1');
            const op1 = (Math.floor(price * 100) % 2 === 0);
            s1.innerText = op1 ? "🔥 OPORTUN." : "⚠️ AGUARDAR";
            s1.style.color = op1 ? "var(--green)" : "var(--red)";
            b1.style.borderBottomColor = op1 ? "var(--green)" : "var(--red)";

            // SINAL 2: Filtro 21 períodos
            const s2 = document.getElementById('s2');
            const b2 = document.getElementById('box2');
            if(hist.length >= 21) {
                const trend = price > hist[hist.length - 21];
                s2.innerText = trend ? "🚀 COMPRA" : "📉 VENDA";
                s2.style.color = trend ? "var(--green)" : "var(--red)";
                b2.style.borderBottomColor = trend ? "var(--green)" : "var(--red)";
            }

            // SINAL 3: Confirmação 50 períodos (ESTAVA SUMIDO)
            const s3 = document.getElementById('s3');
            const b3 = document.getElementById('box3');
            if(hist.length >= 50) {
                const conf = price > hist[0];
                s3.innerText = conf ? "💎 FORTE" : "⚓ FRACO";
                s3.style.color = conf ? "var(--green)" : "var(--red)";
                b3.style.borderBottomColor = conf ? "var(--green)" : "var(--red)";
            } else {
                s3.innerText = `... ${hist.length}/50`;
            }
        }

        function calc() {
            const tp = price * (1 + parseFloat(document.getElementById('tpP').value)/100);
            const sl = price * (1 - parseFloat(document.getElementById('slP').value)/100);
            document.getElementById('resTP').innerText = `$${tp.toFixed(2)}`;
            document.getElementById('resSL').innerText = `$${sl.toFixed(2)}`;
            document.getElementById('results').style.display = 'block';
        }

        function openPass() { document.getElementById('passModal').style.display = 'flex'; }
        function validar() {
            if(document.getElementById('senha').value === 'Maria1301') {
                alert('Acesso ao Robô Liberado (Aguardando Configuração API)');
                document.getElementById('passModal').style.display = 'none';
            } else { alert('Senha incorreta!'); }
        }

        initChart();
    </script>
</body>
</html>
