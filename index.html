<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; font-size: 14px; cursor: pointer; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        
        /* BARRA DE STATUS RESTAURADA */
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 11px; font-weight: bold; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-buy { color: var(--green); }
        .status-buy .dot { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .status-sell { color: var(--red); }
        .status-sell .dot { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .status-wait { color: #ffcc00; }
        .status-wait .dot { background: #ffcc00; box-shadow: 0 0 10px #ffcc00; }
        
        #chart_container { width: 100%; height: 200px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
        
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; }
        
        .res { padding: 15px; background: #0d1117; border-radius: 8px; text-align: left; display: none; margin-bottom: 20px; border: 1px solid #30363d; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }

        .projects-section { margin-top: 10px; border-top: 1px solid #30363d; padding-top: 20px; }
        .projects-title { font-size: 10px; color: var(--text); text-transform: uppercase; margin-bottom: 15px; display: block; }
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: bold; text-align: center; }

        .ad-container { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1e2227, #161b22); border-radius: 12px; border: 1px solid #ffcc0033; }
        .btn-ad { display: block; background: #ffcc00; color: #000; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 10px; }
        
        .clock-container { margin-top: 20px; font-size: 13px; font-family: monospace; color: var(--text); border-top: 1px solid #30363d; padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping Multi-Par</h4>
    
    <select id="pairSelector" onchange="initApp()">
        <optgroup label="Cripto">
            <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
            <option value="OKX:SOLUSDT">OKX - SOL/USDT</option>
            <option value="COINBASE:ETHUSD">Hyperliquid - ETH/USD</option>
        </optgroup>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div id="statusBox" class="status-bar status-wait">
        <span class="dot"></span>
        <span id="statusText">AGUARDANDO CONEXÃO...</span>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="1.0" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Calcular Alvos Agora</button>

    <div id="results" class="res">
        <div class="res-item"><span>🟢 Saída Lucro (TP):</span><span id="resTP" style="color:var(--green); font-weight: bold;"></span></div>
        <div class="res-item"><span>🛑 Saída Perda (SL):</span><span id="resSL" style="color:var(--red); font-weight: bold;"></span></div>
    </div>

    <div class="projects-section">
        <span class="projects-title">Meus Projetos</span>
        <div class="projects-grid">
            <a href="#" class="project-btn">Dashboard 97</a>
            <a href="#" class="project-btn">CombustAI</a>
            <a href="#" class="project-btn">Dashboard 75</a>
            <a href="#" class="project-btn">Pepinômetro</a>
            <a href="#" class="project-btn">História Copas</a>
            <a href="#" class="project-btn">InvestOpção</a>
        </div>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 12px; font-weight: bold;">📺 ATMOS IPTV</span>
        <p style="font-size: 10px; color: #ced4da; margin: 5px 0;">Canais, Filmes e Séries por R$ 30,00.</p>
        <a href="https://wa.me/5597991916621" target="_blank" class="btn-ad">QUERO TESTAR GRÁTIS</a>
    </div>
    
    <div class="clock-container" id="clock">17:31:06</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0;
    function initApp() {
        const symbol = document.getElementById('pairSelector').value;
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "1", "theme": "dark", "style": "1",
            "locale": "br", "container_id": "chart_container", "hide_top_toolbar": false,
            "studies": ["EMA@tv-basicstudies", "EMA@tv-basicstudies", "RSI@tv-basicstudies"]
        });
        
        const pair = symbol.split(':')[1].toLowerCase();
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
        ws.onmessage = (e) => {
            price = parseFloat(JSON.parse(e.data).c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            
            // Lógica do Sinalizador com Bolinha
            const box = document.getElementById('statusBox');
            const txt = document.getElementById('statusText');
            if(price % 2 === 0) {
                box.className = "status-bar status-buy";
                txt.innerText = "OPORTUNIDADE DE COMPRA";
            } else {
                box.className = "status-bar status-wait";
                txt.innerText = "AGUARDAR SINAL";
            }
        };
    }

    function calc() {
        if (price === 0) return;
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        document.getElementById('resTP').innerText = `$ ${(price * (1 + tp/100)).toFixed(4)}`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - sl/100)).toFixed(4)}`;
        document.getElementById('results').style.display = 'block';
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
    }, 1000);

    initApp();
</script>
</body>
</html>
