<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro - v6.0</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e;
            --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; --dark: #090c10;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: white; display: flex; justify-content: center; padding: 15px; }
        
        .card { 
            background: var(--card); padding: 22px; border-radius: 24px; 
            width: 100%; max-width: 410px; border: 1px solid #30363d; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative;
        }

        /* 1. LED ROBÔ ON */
        .header-status { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .robo-led { display: flex; align-items: center; font-size: 9px; font-weight: 900; color: var(--text); }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 10px var(--green); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        h4 { font-size: 10px; color: var(--text); text-transform: uppercase; letter-spacing: 2px; }

        .btn-blue { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; }
        
        .tf-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .tf-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 12px; border-radius: 40px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .tf-btn.active { background: var(--accent); color: white; }

        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 14px; border-radius: 40px; margin-bottom: 20px; font-size: 13px; outline: none; appearance: none; text-align: center; }

        .price-main { font-size: 42px; font-weight: 800; color: var(--green); text-align: center; margin-bottom: 20px; font-family: monospace; text-shadow: 0 0 15px rgba(0,255,136,0.2); }

        /* 2. OS 3 SINAIS COM GLOW */
        .signals-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .sig-item { background: var(--dark); padding: 12px 2px; border-radius: 12px; border: 1px solid #2a3340; text-align: center; border-bottom: 3px solid #333; }
        .sig-item span { font-size: 7px; color: var(--text); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .sig-item b { font-size: 9px; font-weight: bold; }

        #chart_area { width: 100%; height: 240px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; overflow: hidden; }

        /* CALCULADORA REORGANIZADA */
        .inputs-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .field { background: var(--dark); padding: 8px 12px; border-radius: 12px; border: 1px solid #21262d; }
        .field label { font-size: 7px; color: var(--text); display: block; margin-bottom: 2px; }
        .field input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; font-weight: bold; outline: none; }

        .btn-calc-go { width: 100%; padding: 18px; background: var(--green); color: #0d1117; border: none; border-radius: 40px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 12px; box-shadow: 0 5px 15px rgba(0,255,136,0.2); }

        .res-display { margin-top: 15px; padding: 15px; background: #0f151d; border-radius: 15px; display: none; border: 1px solid var(--accent); }

        /* GRADE DE PROJETOS */
        .proj-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 20px; }
        .proj-item { background: #1a222c; color: var(--text); border: 1px solid #30363d; padding: 10px 2px; border-radius: 12px; font-size: 9px; text-decoration: none; text-align: center; font-weight: bold; }

        .btn-gold { width: 100%; background: var(--gold); border: none; padding: 14px; border-radius: 40px; font-weight: 800; margin-top: 15px; cursor: pointer; color: #000; font-size: 11px; }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="header-status">
            <h4>Mestre do Scalping Pro</h4>
            <div class="robo-led"><div class="dot"></div> ROBÔ ON</div>
        </div>

        <button class="btn-blue" onclick="toggleDesk()">🖥️ ALTERNAR MODO COMPUTADOR</button>

        <div class="tf-grid">
            <button class="tf-btn active" onclick="setTF('1', this)">⚡ SCALP (1m)</button>
            <button class="tf-btn" onclick="setTF('15', this)">🔭 DAY (15m)</button>
        </div>

        <select id="pairSelect" onchange="initApp()">
            <optgroup label="Cripto">
                <option value="BINANCE:BTCUSDT">₿ BTC/USDT</option>
                <option value="BINANCE:SOLUSDT">◎ SOL/USDT</option>
                <option value="BINANCE:ETHUSDT">Ξ ETH/USDT</option>
            </optgroup>
            <optgroup label="Metais">
                <option value="TVC:GOLD">🥇 OURO (XAU)</option>
                <option value="TVC:SILVER">🥈 PRATA (XAG)</option>
            </optgroup>
        </select>

        <div class="price-main" id="priceVal">$ 00,000.00</div>

        <div class="signals-container">
            <div id="b1" class="sig-item"><span>SINAL GERAL</span><b id="v1">ANALISANDO</b></div>
            <div id="b2" class="sig-item"><span>FILTRO TÉC.</span><b id="v2">NEUTRO</b></div>
            <div id="b3" class="sig-item" style="border-bottom-color: var(--gold);"><span>OPÇÃO 3</span><b id="v3" style="color:var(--gold)">AGUARDAR</b></div>
        </div>

        <div id="chart_area"></div>

        <div class="inputs-box">
            <div class="field"><label>CAPITAL $</label><input type="number" id="c_in" value="300"></div>
            <div class="field"><label>ALAVANCAGEM</label><input type="number" id="l_in" value="10"></div>
            <div class="field"><label>GAIN %</label><input type="number" id="g_in" value="1.0"></div>
            <div class="field"><label>STOP %</label><input type="number" id="s_in" value="1.0"></div>
        </div>

        <button class="btn-calc-go" onclick="runCalc()">📊 CALCULAR ALVOS AGORA</button>

        <div id="resBox" class="res-display">
            <div style="display:flex; justify-content:space-between; margin-bottom:8px;"><span>🟢 ALVO (TP):</span> <b id="tp_out" style="color:var(--green);"></b></div>
            <div style="display:flex; justify-content:space-between;"><span>🔴 STOP (SL):</span> <b id="sl_out" style="color:var(--red);"></b></div>
        </div>

        <div class="proj-grid">
            <a href="https://site-557591544835-620634786284.southamerica-east1.run.app" class="proj-item">Dashboard 97</a>
            <a href="https://site-combustai-620634786284.southamerica-east1.run.app" class="proj-item">CombustAI</a>
            <a href="https://site-559791916621-620634786284.southamerica-east1.run.app" class="proj-item">DCA Pro</a>
            <a href="https://pepinometro-620634786284.southamerica-east1.run.app" class="proj-item">Pepinômetro</a>
            <a href="https://historia-copas-620634786284.southamerica-east1.run.app" class="proj-item">Hist. Copas</a>
            <a href="https://investopcao.culturabuilder.com" class="proj-item">InvestOpção</a>
        </div>

        <button class="btn-gold" onclick="alert('PIX: 127d59fc-1f37-4e8e-9fd4-295e1883727b')">💰 ABA NATIVOS (DONATIVOS)</button>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let pNow = 0, tf = "1", isD = false, ws = null;

        function setTF(t, b) {
            tf = t;
            document.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            initApp();
        }

        function toggleDesk() {
            isD = !isD;
            document.getElementById('mainCard').style.maxWidth = isD ? '95%' : '410px';
            initApp();
        }

        function initApp() {
            const sym = document.getElementById('pairSelect').value;
            new TradingView.widget({ "autosize": true, "symbol": sym, "interval": tf, "theme": "dark", "container_id": "chart_area", "hide_top_toolbar": !isD });
            
            if(ws) ws.close();
            let pair = sym.split(':')[1].toLowerCase();
            if(pair === "gold") pair = "btcusdt"; // Simulação para metais se não houver stream

            ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
            ws.onmessage = (e) => {
                pNow = parseFloat(JSON.parse(e.data).c);
                document.getElementById('priceVal').innerText = `$ ${pNow.toLocaleString('en-US', {minimumFractionDigits: 2})}`;
                
                // Lógica de Sinais Baseada no seu código original
                const op = (Math.floor(pNow * 100) % 2 === 0);
                document.getElementById('v1').innerText = op ? "COMPRA" : "VENDA";
                document.getElementById('b1').style.borderBottomColor = op ? "var(--green)" : "var(--red)";
                document.getElementById('v1').style.color = op ? "var(--green)" : "var(--red)";
            };
        }

        function runCalc() {
            const g = parseFloat(document.getElementById('g_in').value) / 100;
            const s = parseFloat(document.getElementById('s_in').value) / 100;
            document.getElementById('tp_out').innerText = `$ ${(pNow * (1+g)).toFixed(2)}`;
            document.getElementById('sl_out').innerText = `$ ${(pNow * (1-s)).toFixed(2)}`;
            document.getElementById('resBox').style.display = 'block';
        }

        initApp();
    </script>
</body>
</html>
