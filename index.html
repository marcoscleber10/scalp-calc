<script>
    let currentPrice = 0;
    let pricesHistory = [];
    let isDesktop = false;

    // Função de Inicialização Segura
    function initApp() {
        const symbol = document.getElementById('pairSelector')?.value || "BINANCE:BTCUSDT";
        const container = document.getElementById('chart_container');
        
        if (container) {
            container.innerHTML = '';
            new TradingView.widget({
                "autosize": true, "symbol": symbol, "interval": "1", "theme": "dark", "style": "1",
                "locale": "br", "container_id": "chart_container", "hide_top_toolbar": !isDesktop,
                "studies": ["RSI@tv-basicstudies", "EMA@tv-basicstudies"],
            });
        }
        
        // Conexão WebSocket com tratamento de erro
        let pair = symbol.split(':')[1]?.toLowerCase() || "btcusdt";
        if(pair.includes('usoil')) pair = 'btcusdt'; 

        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
        
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            currentPrice = parseFloat(data.c);
            pricesHistory.push(currentPrice);
            if (pricesHistory.length > 50) pricesHistory.shift();

            // Atualiza o Preço na Tela
            const priceEl = document.getElementById('priceText');
            if (priceEl) priceEl.innerText = `$ ${currentPrice.toFixed(2)}`;
            
            // 1. LÓGICA SINAL GERAL (Mantida a original que você gosta)
            atualizarSinalGeral();

            // 2. NOVO INDICADOR RSI/EMA (Com trava de segurança)
            atualizarSinalTecnico();
        };
    }

    function atualizarSinalGeral() {
        const boxGen = document.getElementById('statusBox');
        const txtGen = document.getElementById('statusText');
        if (!boxGen || !txtGen) return;

        if (Math.floor(currentPrice * 100) % 2 === 0) {
            txtGen.innerText = "🔥 ALTA VOL";
            boxGen.style.borderBottomColor = "var(--green)";
        } else {
            txtGen.innerText = "⚠️ CALMA";
            boxGen.style.borderBottomColor = "var(--red)";
        }
    }

    function atualizarSinalTecnico() {
        const boxRsi = document.getElementById('rsiBox');
        const txtRsi = document.getElementById('rsiText');
        if (!boxRsi || !txtRsi || pricesHistory.length < 21) return;

        const rsi = calcRSI(pricesHistory, 14);
        const ema9 = calcEMA(pricesHistory, 9);
        const ema21 = calcEMA(pricesHistory, 21);

        if (currentPrice > ema9 && ema9 > ema21 && rsi < 65) {
            txtRsi.innerText = "🚀 COMPRA FORTE";
            boxRsi.style.color = "var(--green)";
            boxRsi.style.borderBottomColor = "var(--green)";
        } else if (currentPrice < ema9 && ema9 < ema21 && rsi > 35) {
            txtRsi.innerText = "📉 VENDA FORTE";
            boxRsi.style.color = "var(--red)";
            boxRsi.style.borderBottomColor = "var(--red)";
        } else if (rsi > 70 || rsi < 30) {
            txtRsi.innerText = "🚫 RISCO / RSI: " + Math.round(rsi);
            boxRsi.style.color = "var(--gold)";
            boxRsi.style.borderBottomColor = "var(--gold)";
        } else {
            txtRsi.innerText = "⏳ NEUTRO / RSI: " + Math.round(rsi);
            boxRsi.style.color = "var(--text)";
            boxRsi.style.borderBottomColor = "#30363d";
        }
    }

    // Funções Matemáticas puras (não quebram o código)
    function calcEMA(d, p) {
        let k = 2/(p+1);
        let ema = d[0];
        for(let i=1; i<d.length; i++) ema = d[i]*k + ema*(1-k);
        return ema;
    }

    function calcRSI(d, p) {
        let g=0, l=0;
        for(let i=d.length-p; i<d.length; i++) {
            let diff = d[i]-d[i-1];
            if(diff>=0) g+=diff; else l-=diff;
        }
        return 100 - (100/(1+(g/(l||1))));
    }

    function toggleMode() {
        isDesktop = !isDesktop;
        document.getElementById('mainCard')?.classList.toggle('desktop-mode', isDesktop);
        initApp();
    }

    function calc() {
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        document.getElementById('resTP').innerText = `$ ${(currentPrice * (1 + tp/100)).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(currentPrice * (1 - sl/100)).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    window.onload = initApp;
</script>
