<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESTRE DO SCALPING - RECONSTRUÍDO</title>
    <style>
        :root { 
            --fundo: #0d1117; --painel: #161b22; --verde: #00ff88; 
            --vermelho: #ff3e3e; --texto: #8b949e; --azul: #2f81f7; --ouro: #ffcc00;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--fundo); color: white; display: flex; justify-content: center; padding: 20px; }

        .app { 
            background: var(--painel); width: 100%; max-width: 400px; 
            border-radius: 20px; padding: 20px; border: 1px solid #30363d;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative;
        }

        /* CABEÇALHO COM LED PULSANTE */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-text { font-size: 10px; font-weight: bold; color: var(--texto); text-transform: uppercase; letter-spacing: 1px; }
        .status-robo { display: flex; align-items: center; font-size: 9px; color: var(--texto); font-weight: 900; }
        .led-vivo { 
            width: 8px; height: 8px; background: var(--verde); border-radius: 50%; 
            margin-right: 6px; box-shadow: 0 0 10px var(--verde); animation: pulso 1.5s infinite; 
        }
        @keyframes pulso { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* BOTÕES DE COMANDO REAL */
        .btn-principal { width: 100%; padding: 12px; background: var(--azul); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; }
        
        .grid-tempos { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-tempo { flex: 1; padding: 12px; background: #21262d; border: 1px solid #30363d; color: var(--texto); border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-tempo.ativo { background: var(--azul); color: white; border-color: var(--azul); }

        select { width: 100%; padding: 15px; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 10px; margin-bottom: 20px; font-size: 14px; outline: none; }

        .preco-atual { font-size: 42px; font-weight: 800; color: var(--verde); text-align: center; margin-bottom: 20px; font-family: monospace; }

        /* OS 3 SINAIS DA IMAGEM */
        .container-sinais { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .bloco-sinal { background: #090c10; padding: 10px 2px; border-radius: 8px; border: 1px solid #21262d; text-align: center; border-bottom: 3px solid #30363d; }
        .bloco-sinal span { font-size: 7px; color: var(--texto); display: block; margin-bottom: 5px; }
        .bloco-sinal b { font-size: 9px; text-transform: uppercase; }

        /* GRÁFICO */
        #area-grafico { width: 100%; height: 220px; background: #000; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; overflow: hidden; }

        /* CALCULADORA */
        .grade-calc { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .item-input { background: #090c10; padding: 8px; border-radius: 8px; border: 1px solid #21262d; }
        .item-input label { font-size: 8px; color: var(--texto); display: block; margin-bottom: 4px; }
        .item-input input { background: transparent; border: none; color: white; width: 100%; font-size: 14px; font-weight: bold; outline: none; }

        .btn-calcular { width: 100%; padding: 18px; background: var(--verde); color: #0d1117; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-bottom: 20px; }

        .painel-resultado { background: #0d1117; padding: 15px; border-radius: 10px; border: 1px solid var(--azul); margin-bottom: 20px; display: none; }

        /* 6 PROJETOS */
        .grade-projetos { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .link-projeto { background: #21262d; color: var(--texto); padding: 12px; border-radius: 8px; border: 1px solid #30363d; text-align: center; font-size: 10px; text-decoration: none; font-weight: bold; }

        /* DONATIVOS */
        .btn-nativos { width: 100%; padding: 18px; background: var(--ouro); color: black; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo-text">Mestre do Scalping</div>
        <div class="status-robo"><div class="led-vivo"></div> ROBÔ ON</div>
    </div>

    <button class="btn-principal" onclick="alert('Modo Desktop solicitado!')">🖥️ Alternar Modo Computador</button>

    <div class="grid-tempos">
        <button class="btn-tempo ativo" id="t1" onclick="mudarTempo('1', this)">⚡ SCALP (1m)</button>
        <button class="btn-tempo" id="t15" onclick="mudarTempo('15', this)">🔭 DAY TRADE (15m)</button>
    </div>

    <select id="selecionarAtivo" onchange="atualizarGrafico()">
        <optgroup label="Cripto Hyperliquid">
            <option value="BYBIT:BTCUSDT">BTC/USD (Hyper)</option>
            <option value="BYBIT:SOLUSDT">SOL/USD (Hyper)</option>
        </optgroup>
        <optgroup label="Metais">
            <option value="TVC:GOLD">OURO (XAUUSD)</option>
            <option value="TVC:SILVER">PRATA (XAGUSD)</option>
        </optgroup>
    </select>

    <div class="preco-atual" id="monitorPreco">$ 00,000.00</div>

    <div class="container-sinais">
        <div class="bloco-sinal" id="s1" style="border-bottom-color: var(--verde);"><span>SINAL GERAL</span><b style="color:var(--verde)">Compra</b></div>
        <div class="bloco-sinal" id="s2" style="border-bottom-color: var(--vermelho);"><span>FILTRO TÉCNICO</span><b style="color:var(--vermelho)">Venda</b></div>
        <div class="bloco-sinal" id="s3" style="border-bottom-color: var(--ouro);"><span>OPÇÃO 3</span><b style="color:var(--ouro)">Neutro</b></div>
    </div>

    <div id="area-grafico"></div>

    <div class="grade-calc">
        <div class="item-input"><label>CAPITAL ($)</label><input type="number" id="v_cap" value="300"></div>
        <div class="item-input"><label>ALAVANCAGEM</label><input type="number" id="v_lev" value="10"></div>
        <div class="item-input"><label>GANHO %</label><input type="number" id="v_gain" value="1.0"></div>
        <div class="item-input"><label>STOP %</label><input type="number" id="v_loss" value="1.0"></div>
    </div>

    <button class="btn-calcular" onclick="executarCalculo()">🚀 Calcular Alvos Agora</button>

    <div id="exibirResultado" class="painel-resultado">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:12px;">🟢 TAKE PROFIT:</span>
            <b id="tp_final" style="color:var(--verde)"></b>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <span style="font-size:12px;">🔴 STOP LOSS:</span>
            <b id="sl_final" style="color:var(--vermelho)"></b>
        </div>
    </div>

    <div class="grade-projetos">
        <a href="https://clube-dca.vercel.app/" target="_blank" class="link-projeto">Dashboard 97</a>
        <a href="#" class="link-projeto">CombustAI</a>
        <a href="#" class="link-projeto">Dashboard 75</a>
        <a href="#" class="link-projeto">Pepinômetro</a>
        <a href="#" class="link-projeto">História Copas</a>
        <a href="#" class="link-projeto">InvestOpção</a>
    </div>

    <button class="btn-nativos" onclick="abrirPix()">💰 Aba Nativos (Donativos)</button>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let tempoGlobal = "1";
    let precoSimulado = 73500.00;

    // 1. FUNÇÃO PARA MUDAR O TEMPO (1m ou 15m)
    function mudarTempo(t, elemento) {
        tempoGlobal = t;
        document.querySelectorAll('.btn-tempo').forEach(b => b.classList.remove('ativo'));
        elemento.classList.add('ativo');
        atualizarGrafico();
    }

    // 2. FUNÇÃO PARA ATUALIZAR O GRÁFICO (OBEDECE AO SELECT)
    function atualizarGrafico() {
        const ativo = document.getElementById('selecionarAtivo').value;
        new TradingView.widget({
            "autosize": true,
            "symbol": ativo,
            "interval": tempoGlobal,
            "theme": "dark",
            "style": "1",
            "container_id": "area-grafico",
            "hide_side_toolbar": true,
            "locale": "br"
        });
    }

    // 3. FUNÇÃO DA CALCULADORA (NÃO TRAVA)
    function executarCalculo() {
        const gain = parseFloat(document.getElementById('v_gain').value) / 100;
        const loss = parseFloat(document.getElementById('v_loss').value) / 100;
        
        const tp = precoSimulado * (1 + gain);
        const sl = precoSimulado * (1 - loss);

        document.getElementById('tp_final').innerText = "$ " + tp.toFixed(2);
        document.getElementById('sl_final').innerText = "$ " + sl.toFixed(2);
        document.getElementById('exibirResultado').style.display = 'block';
    }

    // 4. ABA NATIVOS
    function abrirPix() {
        alert("Apoie este projeto:\n\nPIX: 127d59fc-1f37-4e8e-9fd4-295e1883727b\nBTC: bc1q3zf09xtensa5kag3nz6jsvqyle3sgnmns0j9n5\nSOL: EtSD7W7YG36ZuMAAX6bwJYJ9keciRK7cP7rJiadiZdmm");
    }

    // INICIALIZAÇÃO
    atualizarGrafico();
    
    // Simulação de preço variando
    setInterval(() => {
        precoSimulado += (Math.random() - 0.5) * 10;
        document.getElementById('monitorPreco').innerText = "$ " + precoSimulado.toLocaleString('en-US', {minimumFractionDigits: 2});
    }, 2000);
</script>

</body>
</html>
