<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPrice = 0;

    // 1. Inicialização do Gráfico com Indicadores Profissionais
    function initChart() {
        const selectedSymbol = document.getElementById('pairSelector').value;
        
        new TradingView.widget({
            "autosize": true,
            "symbol": selectedSymbol,
            "interval": "1", 
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "chart_container",
            "hide_top_toolbar": false,
            "studies": [
                { "id": "MASimple@tv-basicstudies", "inputs": { "length": 9 }, "title": "EMA 9" },
                { "id": "MASimple@tv-basicstudies", "inputs": { "length": 21 }, "title": "EMA 21" },
                { "id": "RSI@tv-basicstudies", "inputs": { "length": 14 }, "title": "RSI" }
            ]
        });
        
        setupPriceStream(selectedSymbol);
    }

    // 2. Conexão com Preço em Tempo Real (WebSocket)
    function setupPriceStream(symbol) {
        const cleanPair = symbol.split(':')[1].toLowerCase();
        // Fallback para petróleo caso o par não seja cripto pura
        const streamPair = cleanPair.includes("uso") ? "btcusdt" : cleanPair;
        
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${streamPair}@ticker`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            currentPrice = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${currentPrice.toFixed(2)}`;
        };
        
        ws.onerror = () => console.log("Erro na conexão de preço.");
    }

    // 3. Calculadora de Alvos Corrigida
    function calcularAlvos() {
        if (currentPrice === 0) {
            alert("Aguardando carregamento do preço...");
            return;
        }

        const gainPct = parseFloat(document.getElementById('tpP').value) || 0.5;
        const lossPct = parseFloat(document.getElementById('slP').value) || 0.7;
        
        const tpValue = currentPrice * (1 + (gainPct / 100));
        const slValue = currentPrice * (1 - (lossPct / 100));
        
        document.getElementById('resTP').innerText = `$ ${tpValue.toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${slValue.toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    // Inicializar ao carregar a página
    window.onload = () => {
        initChart();
        setInterval(updateTradingClock, 1000);
    };
</script>
