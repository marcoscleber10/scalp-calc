<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0;

    function initApp() {
        const symbol = document.getElementById('pairSelector').value;
        
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1", 
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "chart_container",
            "hide_top_toolbar": false, 
            "save_image": false,
            "studies": [
                {
                    "id": "MASimple@tv-basicstudies",
                    "inputs": { "length": 9 },
                    "title": "EMA 9",
                    "style": { "line.color": "#00ff88" } 
                },
                {
                    "id": "MASimple@tv-basicstudies",
                    "inputs": { "length": 21 },
                    "title": "EMA 21",
                    "style": { "line.color": "#ff3e3e" } 
                },
                {
                    "id": "RSI@tv-basicstudies",
                    "inputs": { "length": 14 },
                    "title": "RSI",
                    "style": { "line.color": "#2f81f7" }
                }
            ]
        });
        
        const pair = symbol.split(':')[1].toLowerCase();
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair === 'usoousd' ? 'btcusdt' : pair}@ticker`);
        ws.onmessage = (e) => {
            price = parseFloat(JSON.parse(e.data).c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(symbol.includes('USO') ? 4 : 2)}`;
            const box = document.getElementById('statusBox');
            
            box.innerText = price % 2 === 0 ? "🔥 OPORTUNIDADE DE COMPRA" : "⚠️ HORA DE VENDER / AGUARDAR";
            box.className = price % 2 === 0 ? "status-bar buy" : "status-bar sell";
        };
    }

    function calc() {
        if (price === 0) return;
        const tp = parseFloat(document.getElementById('tpP').value); 
        const sl = parseFloat(document.getElementById('slP').value); 
        
        const resTP = price * (1 + tp/100);
        const resSL = price * (1 - sl/100);
        
        document.getElementById('resTP').innerText = `$ ${resTP.toFixed(4)}`;
        document.getElementById('resSL').innerText = `$ ${resSL.toFixed(4)}`;
        document.getElementById('results').style.display = 'block';
    }

    setInterval(updateTradingClock, 1000);
    initApp();
</script>
