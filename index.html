<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScalpCalc Pro Multi-Data</title>
    <style>
        :root { --bg: #0a0e14; --card: #151a21; --green: #00ff88; --red: #ff3e3e; --text: #848e9c; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        header { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-bottom: 1px solid #2b3139; }
        .price { font-size: 22px; font-weight: bold; color: var(--green); }
        .chart-area { flex-grow: 1; width: 100%; position: relative; }
        .bottom-panel { background: var(--card); padding: 12px; border-top: 1px solid #2b3139; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; display: block; margin-bottom: 2px; }
        input { width: 100%; background: #2b3139; border: 1px solid #474d57; color: white; padding: 6px; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--green); color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .results { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; border-top: 1px solid #2b3139; padding-top: 8px; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <select id="ex" onchange="changeEx()" style="background:#2b3139; color:white; border:none; padding:5px; border-radius:4px; font-size: 11px;">
            <option value="BINANCE:BTCUSDT">Binance / Quantfury</option>
            <option value="OKX:BTCUSDT">OKX (BTC/USDT)</option>
            <option value="BITGET:BTCUSDT">Hyperliquid (Proxy)</option>
        </select>
        <div class="price" id="p">Aguardando...</div>
    </header>

    <div class="chart-area" id="tv_chart"></div>

    <div class="bottom-panel">
        <div class="grid">
            <div><label>Capital</label><input type="number" id="c" value="300"></div>
            <div><label>Alav.</label><input type="number" id="l" value="10"></div>
            <div><label>Alvo %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
            <div><label>Stop %</label><input type="number" id="slP" value="0.8" step="0.1"></div>
        </div>
        
        <button onclick="calc()">CALCULAR POSIÇÃO</button>

        <div id="res" class="results" style="display:none">
            <div>🟢 Saída (TP): <b id="rtp" style="color:var(--green)"></b></div>
            <div>🔴 Stop (SL): <b id="rsl" style="color:var(--red)"></b></div>
            <div style="grid-column: span 2; font-size: 11px; color: var(--text);">Total Operado: <span id="rv"></span></div>
        </div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let curP = 0;
    function load(s) {
        new TradingView.widget({
            "autosize": true, "symbol": s, "interval": "1", "theme": "dark", "style": "1",
            "locale": "br", "container_id": "tv_chart", "hide_side_toolbar": false,
            "studies": ["RSI@tv-basicstudies", "StochasticRSI@tv-basicstudies", "Volume@tv-basicstudies"]
        });
    }

    const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    ws.onmessage = (e) => {
        curP = parseFloat(JSON.parse(e.data).c);
        document.getElementById('p').innerText = '$' + curP.toLocaleString('en-US', {minimumFractionDigits: 2});
    };

    function calc() {
        if(curP === 0) return;
        let t = parseFloat(document.getElementById('tpP').value)/100;
        let s = parseFloat(document.getElementById('slP').value)/100;
        document.getElementById('rtp').innerText = (curP*(1+t)).toFixed(2);
        document.getElementById('rsl').innerText = (curP*(1-s)).toFixed(2);
        document.getElementById('rv').innerText = '$' + (document.getElementById('c').value * document.getElementById('l').value).toFixed(2);
        document.getElementById('res').style.display = 'grid';
    }

    function changeEx() { load(document.getElementById('ex').value); }
    load("BINANCE:BTCUSDT");
</script>
</body>
</html>
