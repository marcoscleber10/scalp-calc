<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc Pro + Gráfico RSI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0e14; color: white; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; align-items: flex-start; }
        
        /* Layout centralizado e proporcional */
        .card { background: #151a21; padding: 15px; border-radius: 16px; width: 100%; max-width: 440px; border: 1px solid #2b3139; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        
        .price-box { font-size: 32px; font-weight: bold; color: #00ff88; text-align: center; margin: 8px 0; letter-spacing: 1px; }
        
        /* Painel de Sinal Inteligente */
        .signal-meter { background: #1c2128; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 12px; border: 1px solid #2b3139; }
        .signal-text { font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .progress-bar { background: #2b3139; height: 6px; border-radius: 3px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.5s; background: #848e9c; }
        
        /* Área do Gráfico Embutido - Altura proporcional */
        .chart-container { width: 100%; height: 350px; margin-bottom: 12px; border-radius: 10px; overflow: hidden; border: 1px solid #2b3139; }
        
        .flex { display: flex; gap: 8px; margin-bottom: 8px; }
        .flex div { flex: 1; }
        label { font-size: 10px; color: #848e9c; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 2px;}
        input, select { width: 100%; padding: 10px; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none;}
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00ff88; color: black; font-size: 15px; margin-top: 8px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0, 255, 136, 0.1); }
        button:active { transform: scale(0.98); background: #00cc6e; }
        
        .res { margin-top: 15px; padding: 12px; border-radius: 10px; background: #1c2128; border-left: 4px solid #00ff88; display: none; font-size: 14px; border: 1px solid #2b3139; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="text-align:center; margin-top:0; color:#848e9c; font-size: 16px; margin-bottom:10px;">ScalpCalc Inteligente</h3>
        
        <select id="exchangeSelect" onchange="changeExchange()">
            <option value="binance">Binance (BTC/USDT)</option>
            <option value="hyperliquid">Hyperliquid (BTC/USDC)</option>
        </select>

        <div class="price-box" id="priceDisplay">Carregando...</div>

        <div class="signal-meter">
            <div id="entrySignal" class="signal-text" style="color:#848e9c">Analisando Mercado...</div>
            <div class="progress-bar">
                <div id="meterFill" class="progress-fill"></div>
            </div>
        </div>

        <div class="chart-container">
            <div class="tradingview-widget-container" style="height:100%;width:100%">
              <div id="tradingview_chart" style="height:100%;width:100%"></div>
              <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
              <script type="text/javascript">
              new TradingView.widget(
              {
              "autosize": true,
              "symbol": "BINANCE:BTCUSDT",
              "interval": "1",
              "timezone": "Etc/UTC",
              "theme": "dark",
              "style": "1",
              "locale": "br",
              "toolbar_bg": "#f1f3f6",
              "enable_publishing": false,
              "hide_legend": true,
              "save_image": false,
              "container_id": "tradingview_chart",
              "studies": [
                "RSI@tv-basicstudies"
              ]
            }
              );
              </script>
            </div>
            </div>

        <div class="flex">
            <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
            <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        </div>

        <div class="flex">
