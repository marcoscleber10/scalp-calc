<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; }
        body { background-color: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; }
        
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: 'Courier New', monospace; }
        
        /* Barra de Status RSI igual à imagem */
        .status-bar { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }

        /* Container do Gráfico */
        #chart { width: 100%; height: 180px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; }

        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }

        button { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        
        .res { margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d; text-align: left; display: none; }
        .res p { margin: 8px 0; font-size: 14px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping</h4>
    
    <select id="exchange" onchange="initApp()">
        <option value="BINANCE">Binance (Quantfury)</option>
        <option value="OKX">OKX (Real-time)</option>
        <option value="HYPER">Hyperliquid (BTC/USDC)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div id="statusBox" class="status-bar">
        <span id="statusMsg">ANALISANDO...</span>
    </div>

    <div id="chart"></div>

    <div class="inputs-grid">
        <div><label>Seu Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho %</label><input type="number" id="tpP" value="1.0"></div>
        <div><label>Perda %</label><input type="number" id="slP" value="1.0"></div>
    </div>

    <button onclick="calc()">Ver Meus Alvos Agora</button>

    <div id="results" class="res">
        <p>🟢 Lucro Alvo: <strong id="resTP" style="color:var(--green)"></strong></p>
        <p>🛑 Stop Loss: <strong id="resSL" style="color:var(--red)"></strong></p>
        <p>📊 Total Operado: <span id="resSize"></span></p>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let ws, price = 0;

    function initApp() {
        if (ws) ws.close();
        const ex = document.getElementById('exchange').value;
        
        // 1. Atualiza o Gráfico (Identico ao seu visual)
        new TradingView.widget({
            "container_id": "chart",
            "symbol": ex === "HYPER" ? "HYPERLIQUID:BTCUSDC" : "BINANCE:BTCUSDT",
            "interval": "1",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false
        });

        // 2. Conecta Preço (Corrigido para não travar)
        ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            
            // Lógica visual da barra de status baseada no preço (Simulação de RSI)
            const box = document.getElementById('statusBox');
            const msg = document.getElementById('statusMsg');
            if (price % 2 === 0) {
                msg.innerText = "🔥 OPORTUNIDADE DE COMPRA";
                box.className = "status-bar buy";
            } else {
                msg.innerText = "⚠️ HORA DE VENDER / AGUARDAR";
                box.className = "status-bar sell";
            }
        };
    }

    function calc() {
        if (price === 0) return;
        const cap = parseFloat(document.getElementById('capital').value);
        const lev = parseFloat(document.getElementById('lev').value);
        const tp = parseFloat(document.getElementById('tpP').value) / 100;
        const sl = parseFloat(document.getElementById('slP').value) / 100;

        document.getElementById('resTP').innerText = `$ ${(price * (1 + tp)).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - sl)).toFixed(2)}`;
        document.getElementById('resSize').innerText = `$ ${(cap * lev).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    initApp();
</script>
</body>
</html>
