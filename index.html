<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card.desktop-mode { max-width: 95%; }
        .desktop-mode #chart_container { height: 500px !important; }
        
        /* Botões de Tempo */
        .time-grid { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-time { flex: 1; padding: 10px; border-radius: 8px; font-size: 9px; font-weight: bold; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #8b949e; text-transform: uppercase; }
        .btn-time.active { background: var(--accent); color: white; border: none; }
        .btn-time.active[id="t1m"] { background: var(--green); color: #000; }
        .btn-time.active[id="t1h"] { background: var(--gold); color: #000; }

        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; font-size: 14px; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; border-bottom: 3px solid #30363d; text-align: center; }
        
        #chart_container { width: 100%; height: 250px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; position: relative; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .res { margin-top: 20px; padding-top: 20px; border-top: 1px solid #30363d; text-align: left; display: none; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h4>Mestre do Scalping Pro</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ Alternar Modo Computador</button>

    <div class="time-grid">
        <button class="btn-time active" id="t1m" onclick="mudarTempo('1', 't1m')">⚡ SCALP (1m)</button>
        <button class="btn-time" id="t15m" onclick="mudarTempo('15', 't15m')">🔭 DAY (15m)</button>
        <button class="btn-time" id="t1h" onclick="mudarTempo('60', 't1h')">🏛️ TREND (1h)</button>
    </div>

    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="OKX:BTCUSDT">OKX - BTC/USDT</option>
        <option value="TVC:USOIL">Petróleo (WTI)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div class="status-grid">
        <div id="statusBox" class="status-bar">SINAL GERAL<br><span id="statusText">CONECTANDO...</span></div>
        <div id="rsiBox" class="status-bar">FILTRO TÉCNICO<br><span id="rsiText">AGUARDANDO...</span></div>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label style="font-size: 9px; color: var(--text);">Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label style="font-size: 9px; color: var(--text);">Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label style="font-size: 9px; color: var(--text);">Ganho %</label><input type="number" id="tpP" value="1.0" step="0.1"></div>
        <div><label style="font-size: 9px; color: var(--text);">Stop %</label><input type="number" id="slP" value="1.0" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Calcular Alvos</button>

    <div id="results" class="res">
        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;"><span>🟢 TP:</span><span id="resTP" style="color:var(--green); font-weight: bold;"></span></div>
        <div style="display:flex; justify-content: space-between;"><span>🛑 SL:</span><span id="resSL" style="color:var(--red); font-weight: bold;"></span></div>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let price = 0;
    let pricesHistory = [];
    let isDesktop = false;
    let tempoAtual = "1";
    let socket;

    function mudarTempo(min, id) {
        tempoAtual = min;
        document.querySelectorAll('.btn-time').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // Ajusta alvos sugeridos conforme o tempo
        if(min === '1') { document.getElementById('tpP').value = "1.0"; document.getElementById('slP').value = "1.0"; }
        else if(min === '15') { document.getElementById('tpP').value = "3.0"; document.getElementById('slP').value = "1.5"; }
        else { document.getElementById('tpP').value = "8.0"; document.getElementById('slP').value = "3.0"; }

        pricesHistory = [];
        initApp();
    }

    function toggleMode() {
        isDesktop = !isDesktop;
        document.getElementById('mainCard').classList.toggle('desktop-mode', isDesktop);
        initApp();
    }

    function initApp() {
        const symbol = document.getElementById('pairSelector').value;
        
        // SOLUÇÃO PARA TELA PRETA: Forçar a limpeza completa do contêiner
        const container = document.getElementById('chart_container');
        container.innerHTML = '<div id="tv_chart"></div>'; 

        setTimeout(() => {
            new TradingView.widget({
                "width": "100%",
                "height": isDesktop ? 500 : 250,
                "symbol": symbol,
                "interval": tempoAtual,
                "theme": "dark",
                "style": "1",
                "locale": "br",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": !isDesktop,
                "save_image": false,
                "container_id": "tv_chart"
            });
        }, 100);
        
        conectarWS(symbol);
    }

    function conectarWS(symbol) {
        if(socket) socket.close();
        let pair = symbol.split(':')[1].toLowerCase();
        if(pair === 'usoil') pair = 'btcusdt';
        socket = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);
            price = parseFloat(data.c);
            document.getElementById('priceText').innerText = `$ ${price.toFixed(2)}`;
            pricesHistory.push(price);
            if (pricesHistory.length > 50) pricesHistory.shift();
            
            // Lógica Par/Ímpar do Sinal Geral
            const box = document.getElementById('statusBox');
            if (Math.floor(price * 100) % 2 === 0) {
                document.getElementById('statusText').innerText = "🔥 OPORTUNIDADE";
                box.style.borderBottomColor = "var(--green)";
                box.style.color = "var(--green)";
            } else {
                document.getElementById('statusText').innerText = "⚠️ AGUARDAR";
                box.style.borderBottomColor = "var(--red)";
                box.style.color = "var(--red)";
            }
            atualizarTecnico();
        };
    }

    function atualizarTecnico() {
        if (pricesHistory.length < 21) return;
        const rsi = calcRSI(pricesHistory, 14);
        const ema9 = calcEMA(pricesHistory, 9);
        const rsiBox = document.getElementById('rsiBox');
        
        if (price > ema9 && rsi < 65) {
            document.getElementById('rsiText').innerText = "🚀 COMPRA";
            rsiBox.style.borderBottomColor = "var(--green)";
        } else if (price < ema9 && rsi > 35) {
            document.getElementById('rsiText').innerText = "📉 VENDA";
            rsiBox.style.borderBottomColor = "var(--red)";
        } else {
            document.getElementById('rsiText').innerText = "⏳ NEUTRO";
            rsiBox.style.borderBottomColor = "#30363d";
        }
    }

    function calcEMA(d, p) { let k = 2/(p+1); let ema = d[0]; for(let i=1; i<d.length; i++) ema = d[i]*k + ema*(1-k); return ema; }
    function calcRSI(d, p) { let g=0, l=0; for(let i=d.length-p; i<d.length; i++) { let diff = d[i]-d[i-1]; if(diff>=0) g+=diff; else l-=diff; } return 100 - (100/(1+(g/(l||1)))); }
    function calc() {
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        document.getElementById('resTP').innerText = `$ ${(price * (1 + tp/100)).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(price * (1 - sl/100)).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    initApp();
</script>
</body>
</html>
