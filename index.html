<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative; }
        h4 { color: var(--text); font-size: 10px; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }

        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 12px; font-size: 11px; }
        
        /* Preço e Seleção */
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
        .price { font-size: 32px; font-weight: 700; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        
        /* Gráfico */
        #chart_container { width: 100%; height: 180px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #30363d; background: #000; overflow: hidden; }
        
        /* Botões de Projetos - CORREÇÃO DE CLIQUE */
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .project-btn { 
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d; 
            padding: 10px; border-radius: 6px; font-size: 10px; 
            text-decoration: none; text-align: center; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .project-btn:active { background: #30363d; transform: scale(0.95); }

        /* Status do Robô */
        #botControl { display: none; margin-top: 15px; padding: 12px; border: 1px dashed var(--green); border-radius: 8px; background: rgba(0, 255, 136, 0.05); }

        /* Tabela de Sessões */
        .market-table { width: 100%; font-size: 9px; margin-top: 20px; border-collapse: collapse; color: var(--text); text-align: left; }
        .market-table td { padding: 6px 0; border-bottom: 1px solid #21262d; }
        .market-header { color: var(--accent); font-weight: bold; font-size: 8px; text-transform: uppercase; margin-top: 15px; text-align: left; width: 100%; }

        /* Bolinha Azul */
        .secret-dot { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; border: 2px solid white; font-size: 20px; }
        
        #authBox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 17, 23, 0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="alert('Modo Desktop Ativado')">🖥️ ALTERNAR MODO COMPUTADOR</button>
    
    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid - BTC/USD</option>
        <option value="TVC:GOLD">Ouro (XAUUSD)</option>
    </select>

    <div class="price" id="priceText">$ 00.000,00</div>

    <div id="chart_container"></div>

    <div class="projects-grid">
        <div class="project-btn" onclick="navegar('Dashboard 97')">Dashboard 97</div>
        <div class="project-btn" onclick="navegar('CombustAI')">CombustAI</div>
        <div class="project-btn" onclick="navegar('Dashboard 75')">Dashboard 75</div>
        <div class="project-btn" onclick="navegar('Pepinômetro')">Pepinômetro</div>
        <div class="project-btn" onclick="navegar('História Copas')">História Copas</div>
        <div class="project-btn" onclick="navegar('InvestOpção')">InvestOpção</div>
    </div>

    <div id="botControl">
        <span style="color:var(--green); font-size:10px; font-weight:bold;">🤖 ROBÔ HYPERLIQUID ATIVO</span>
        <button class="btn-mode" style="background:var(--green); color:black; margin-top:10px;" onclick="alert('Ordem Enviada!')">EXECUTAR</button>
    </div>

    <div class="market-header">🕒 SESSÕES CRIPTO / FOREX</div>
    <table class="market-table">
        <tr><td>🌏 Ásia</td><td>21:00 - 01:00</td><td style="text-align:right; color:var(--gold);">● Médio</td></tr>
        <tr><td>🇪🇺 Londres</td><td>04:00 - 09:00</td><td style="text-align:right; color:var(--green);">● Alto</td></tr>
        <tr><td>🇺🇸 NY</td><td>10:00 - 14:00</td><td style="text-align:right; color:var(--green);">● Pico</td></tr>
    </table>
</div>

<div class="secret-dot" onclick="abrirPainel()">⚙️</div>

<div id="authBox">
    <h3 style="color:var(--accent)">SISTEMA CORE</h3>
    <input type="password" id="pass" placeholder="Senha" style="width:200px; padding:12px; border-radius:8px; border:1px solid #30363d; background:#21262d; color:white; text-align:center; margin-bottom:10px;">
    <button class="btn-mode" style="width:200px" onclick="validar()">ENTRAR</button>
    <p onclick="fecharPainel()" style="color:var(--text); cursor:pointer; margin-top:20px;">Fechar</p>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    function initApp() {
        const sym = document.getElementById('pairSelector').value;
        new TradingView.widget({ "autosize": true, "symbol": sym, "interval": "1", "theme": "dark", "container_id": "chart_container", "locale": "br" });
    }

    // Funções de Navegação dos Botões
    function navegar(projeto) {
        console.log("Navegando para: " + projeto);
        alert("Abrindo ferramenta: " + projeto);
        // Aqui você pode colocar o link real, exemplo:
        // if(projeto === 'Pepinômetro') window.location.href = 'link_do_projeto.html';
    }

    // Funções da Bolinha Azul
    function abrirPainel() { document.getElementById('authBox').style.display = 'flex'; }
    function fecharPainel() { document.getElementById('authBox').style.display = 'none'; }
    function validar() {
        if(document.getElementById('pass').value === "123") {
            document.getElementById('botControl').style.display = 'block';
            fecharPainel();
            alert("Acesso ao Robô Liberado!");
        } else {
            alert("Senha Incorreta!");
        }
    }

    initApp();
</script>
</body>
</html>
