<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: max-width 0.3s ease; }
        .card.desktop-mode { max-width: 95%; }
        .desktop-mode #chart_container { height: 500px !important; }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .time-selector { display: flex; gap: 8px; margin-bottom: 15px; }
        .time-btn { flex: 1; background: #21262d; border: 1px solid #30363d; color: var(--text); padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .time-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; outline: none; font-size: 14px; cursor: pointer; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; transition: all 0.2s; }
        
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; border-bottom: 3px solid #30363d; text-align: center; }
        .status-label { font-size: 8px; color: var(--text); display: block; margin-bottom: 4px; text-transform: uppercase; }

        #chart_container { width: 100%; height: 250px; border-radius: 8px; margin-bottom: 20px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; margin-bottom: 12px; font-size: 14px; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: bold; text-align: center; }
        
        .ad-container { margin-top: 25px; padding: 15px; background: linear-gradient(145deg, #1e2227, #161b22); border-radius: 12px; border: 1px solid #ffcc0033; }
        .btn-ad { display: block; background: #ffcc00; color: #000; text-decoration: none; padding: 10px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 10px; text-align: center;}
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ Alternar Modo Computador</button>

    <div class="time-selector">
        <button class="time-btn active" onclick="setTF('1')">⚡ SCALP (1m)</button>
        <button class="time-btn" onclick="setTF('15')">🔭 DAY TRADE (15m)</button>
    </div>

    <select id="pairSelector" onchange="initApp()">
        <option value="BTCUSDT">Binance - BTC/USDT</option>
        <option value="ETHUSDT">Binance - ETH/USDT</option>
        <option value="SOLUSDT">Binance - SOL/USDT</option>
        <option value="XAUUSD">Ouro (XAU/USD)</option>
    </select>

    <div class="price" id="priceText">$ --.---</div>

    <div class="status-grid">
        <div id="statusBox" class="status-bar">
            <span class="status-label">SINAL GERAL</span>
            <span id="statusText">CONECTANDO...</span>
        </div>
        <div id="rsiBox" class="status-bar">
            <span class="status-label">FILTRO TÉCNICO</span>
            <span id="rsiText">COLETANDO...</span>
        </div>
    </div>

    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
    </div>

    <button class="btn-calc" onclick="alert('Executando Ordem...')">Calcular Alvos</button>

    <div class="projects-grid">
        <a href="https://site-559791916621-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Dashboard 97</a>
        <a href="https://site-combustai-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">CombustAI</a>
        <a href="https://pepinometro-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Pepinômetro</a>
        <a href="https://investopcao.culturabuilder.com" target="_blank" class="project-btn">InvestOpção</a>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 12px; font-weight: bold;">📺 ATMOS IPTV / SÍTIO MÃE MARIA</span>
        <a href="https://wa.me/5597991916621" target="_blank" class="btn-ad">SUPORTE WHATSAPP</a>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentTF = '1';
    let socket = null;

    function toggleMode() {
        document.getElementById('mainCard').classList.toggle('desktop-mode');
        initApp();
    }

    function setTF(tf) {
        currentTF = tf;
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        initApp();
    }

    function initApp() {
        const pair = document.getElementById('pairSelector').value;
        const chartSymbol = pair === 'XAUUSD' ? 'OANDA:XAUUSD' : `BINANCE:${pair}`;
        
        // 1. Carrega o Gráfico Real da TradingView
        new TradingView.widget({
            "autosize": true,
            "symbol": chartSymbol,
            "interval": currentTF,
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "save_image": false,
            "container_id": "chart_container"
        });

        // 2. Conecta ao WebSocket da Binance para Preço em Tempo Real
        if(socket) socket.close();
        if(pair !== 'XAUUSD') {
            socket = new WebSocket(`wss://stream.binance.com:9443/ws/${pair.toLowerCase()}@ticker`);
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c).toFixed(2);
                document.getElementById('priceText').innerText = `$ ${price}`;
                
                // Simulação de Sinal baseado no preço
                const statusBox = document.getElementById('statusBox');
                if (data.P > 0) {
                    document.getElementById('statusText').innerText = "🔥 OPORTUNIDADE";
                    statusBox.style.borderBottomColor = "var(--green)";
                } else {
                    document.getElementById('statusText').innerText = "⚠️ AGUARDAR";
                    statusBox.style.borderBottomColor = "var(--red)";
                }
                document.getElementById('rsiText').innerText = data.P > 0 ? "🚀 COMPRA" : "📉 VENDA";
            };
        } else {
            document.getElementById('priceText').innerText = "OURO (LIVE)";
        }
    }

    // Iniciar na primeira carga
    initApp();
</script>
</body>
</html>
