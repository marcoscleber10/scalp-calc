<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card.desktop-mode { max-width: 95%; }
        
        /* Estilo das Abas de Tempo */
        .time-grid { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-time { flex: 1; padding: 10px; border-radius: 8px; font-size: 9px; font-weight: bold; cursor: pointer; border: 1px solid #30363d; background: #21262d; color: #8b949e; text-transform: uppercase; }
        .btn-time.active[id="t1m"] { background: var(--green); color: #0d1117; border: none; }
        .btn-time.active[id="t15m"] { background: var(--accent); color: white; border: none; }
        .btn-time.active[id="t1h"] { background: var(--gold); color: #0d1117; border: none; }

        .btn-mode { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 11px; text-transform: uppercase; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .price { font-size: 36px; font-weight: 800; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: bold; border-bottom: 3px solid #30363d; }
        
        #chart_container { width: 100%; height: 250px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #30363d; background: #000; overflow: hidden; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 6px; box-sizing: border-box; }
        .btn-calc { width: 100%; padding: 16px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; border-top: 1px solid #30363d; padding-top: 20px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 10px; border-radius: 6px; font-size: 11px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-mode" onclick="toggleMode()">🖥️ Alternar Modo Computador</button>

    <div class="time-grid">
        <button class="btn-time active" id="t1m" onclick="mudarTempo('1', 't1m')">⚡ SCALP (1m)</button>
        <button class="btn-time" id="t15m" onclick="mudarTempo('15', 't15m')">🔭 DAY (15m)</button>
        <button class="btn-time" id="t1h" onclick="mudarTempo('60', 't1h')">🏛️ TREND (1h)</button>
    </div>

    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="OKX:BTCUSDT">OKX - BTC/USDT</option>
        <option value="COINBASE:BTCUSD">Hyperliquid - BTC/USD</option>
    </select>

    <div class="price" id="priceText">$--.---</div>

    <div class="status-grid">
        <div id="statusBox" class="status-bar">SINAL GERAL<br><span id="statusText">CONECTANDO...</span></div>
        <div id="rsiBox" class="status-bar">FILTRO TÉCNICO<br><span id="rsiText">COLETANDO...</span></div>
    </div>
