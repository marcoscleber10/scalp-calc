<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpCalc Pro + RSI</title>
    <style>
        body { font-family: sans-serif; background: #0a0e14; color: white; display: flex; justify-content: center; padding: 20px; }
        .card { background: #151a21; padding: 20px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #2b3139; }
        .price-box { font-size: 24px; font-weight: bold; color: #00ff88; margin: 10px 0; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2b3139; border: 1px solid #474d57; color: white; border-radius: 5px; box-sizing: border-box; }
        .indicator { display: flex; justify-content: space-between; margin: 15px 0; padding: 10px; background: #1c2128; border-radius: 8px; }
        .status { font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .buy { background: #00ff8822; color: #00ff88; }
        .sell { background: #ff3e3e22; color: #ff3e3e; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #00ff88; color: black; margin-top: 10px; }
        .res { margin-top: 20px; padding-top: 20px; border-top: 1px solid #2b3139; }
    </style>
</head>
<body>
    <div class="card">
        <h3>ScalpCalc Pro (BTC/USDT)</h3>
        
        <div class="price-box" id="btcPrice">Carregando preço...</div>
        
        <div class="indicator">
            <span>RSI (14): <strong id="rsiVal">--</strong></span>
            <span id="rsiStatus" class="status">Aguardando...</span>
        </div>

        <label>Capital ($):</label>
        <input type="number" id="c" value="300">
        
        <label>Alavancagem:</label>
        <input type="number" id="l" value="10">

        <button onclick="calculatePositions()">CALCULAR ALVOS</button>

        <div id="r" class="res" style="display:none">
            <p>💰 Lucro Alvo (+0.40%): <span id="tp" style="color:#00ff88"></span></p>
            <p>🛑 Stop Loss (-0.25%): <span id="sl" style="color:#ff3e3e"></span></p>
            <p>📊 Tamanho da Posição: <span id="posSize"></span></p>
        </div>
    </div>

    <script>
        let currentPrice = 0;
        let prices = [];

        // 1. Conexão em tempo real com a Binance
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            currentPrice = parseFloat(data.c);
            document.getElementById('btcPrice').innerText = `$ ${currentPrice.toFixed(2)}`;
            
            // Simulação simples de RSI para o exemplo (em apps reais usa-se velas de 1min)
            updateRSI(currentPrice);
        };

        function updateRSI(price) {
            prices.push(price);
            if(prices.length > 14) prices.shift();
            
            if(prices.length === 14) {
                // Cálculo simplificado de RSI
                let gains = 0, losses = 0;
                for(let i=1; i<14; i++) {
                    let diff = prices[i] - prices[i-1];
                    diff > 0 ? gains += diff : losses -= diff;
                }
                let rs = gains / (losses || 1);
                let rsi = 100 - (100 / (1 + rs));
                
                document.getElementById('rsiVal').innerText = rsi.toFixed(2);
                const status = document.getElementById('rsiStatus');
                
                if(rsi < 35) {
                    status.innerText = "COMPRA (SOBREVENDIDO)";
                    status.className = "status buy";
                } else if(rsi > 65) {
                    status.innerText = "VENDA (SOBRECOMPRADO)";
                    status.className = "status sell";
                } else {
                    status.innerText = "NEUTRO";
                    status.className = "status";
                }
            }
        }

        function calculatePositions() {
            if(currentPrice === 0) return;
            const cap = parseFloat(document.getElementById('c').value);
            const lev = parseFloat(document.getElementById('l').value);

            document.getElementById('tp').innerText = `$ ${(currentPrice * 1.004).toFixed(2)}`;
            document.getElementById('sl').innerText = `$ ${(currentPrice * 0.9975).toFixed(2)}`;
            document.getElementById('posSize').innerText = `$ ${(cap * lev).toFixed(2)}`;
            document.getElementById('r').style.display = 'block';
        }
    </script>
</body>
</html>
