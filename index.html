<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; --gold: #ffcc00; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; overflow-x: hidden; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; width: 100%; max-width: 380px; text-align: center; border: 1px solid #30363d; box-shadow: 0 8px 24px rgba(0,0,0,0.5); position: relative; box-sizing: border-box; }
        h4 { color: var(--text); font-size: 10px; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Botões de Cima */
        .btn-blue { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 12px; font-size: 11px; }
        
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; outline: none; }
        .price { font-size: 32px; font-weight: 700; color: var(--green); margin-bottom: 15px; font-family: monospace; }
        
        #chart_container { width: 100%; height: 180px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #30363d; background: #000; overflow: hidden; }

        /* GRADE DE BOTÕES (CORREÇÃO DE CLIQUE) */
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .project-btn { 
            background: #21262d; color: #c9d1d9; border: 1px solid #30363d; 
            padding: 12px; border-radius: 6px; font-size: 11px; 
            font-weight: bold; cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .project-btn:active { background: #30363d; transform: scale(0.98); }

        /* Bloco do Robô */
        #botControl { display: none; margin-top: 15px; padding: 12px; border: 1px dashed var(--green); border-radius: 8px; background: rgba(0, 255, 136, 0.05); }

        /* Suporte e Rodapé */
        .ad-box { margin-top: 20px; padding: 15px; background: #1c2128; border-radius: 10px; border: 1px solid #444; }
        .btn-gold { display: block; background: var(--gold); color: #000; text-decoration: none; padding: 12px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; border: none; width: 100%; box-sizing: border-box; }

        .market-table { width: 100%; font-size: 10px; margin-top: 20px; border-collapse: collapse; color: var(--text); }
        .market-table td { padding: 8px 0; border-bottom: 1px solid #21262d; }

        /* Bolinha Azul (Configurações) */
        .floating-config { position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Modal de Autenticação */
        #modalAuth { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 20, 30, 0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .input-pass { width: 220px; padding: 15px; border-radius: 8px; border: 1px solid #30363d; background: #21262d; color: white; text-align: center; font-size: 16px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping Multi-Par</h4>
    <button class="btn-blue" onclick="alert('Alternando visualização...')">🖥️ ALTERNAR MODO COMPUTADOR</button>
    
    <select id="pairSelector" onchange="renderChart()">
        <option value="BINANCE:BTCUSDT">Binance - BTC/USDT</option>
        <option value="BYBIT:BTCUSDT">Hyperliquid - BTC/USD</option>
        <option value="TVC:GOLD">Ouro (XAUUSD)</option>
    </select>

    <div class="price" id="priceText">$ 75.876,30</div>

    <div id="chart_container"></div>

    <div class="projects-grid">
        <div class="project-btn" onclick="openTool('Dashboard 97')">Dashboard 97</div>
        <div class="project-btn" onclick="openTool('CombustAI')">CombustAI</div>
        <div class="project-btn" onclick="openTool('Dashboard 75')">Dashboard 75</div>
        <div class="project-btn" onclick="openTool('Pepinômetro')">Pepinômetro</div>
        <div class="project-btn" onclick="openTool('História Copas')">História Copas</div>
        <div class="project-btn" onclick="openTool('InvestOpção')">InvestOpção</div>
    </div>

    <div id="botControl">
        <div style="color:var(--green); font-size:10px; font-weight:bold; margin-bottom:10px;">🤖 ROBÔ HYPERLIQUID ATIVO</div>
        <button class="btn-blue" onclick="alert('Executando Ordem...')">EXECUTAR NO HYPERLIQUID</button>
    </div>

    <div class="ad-box">
        <div style="font-size:9px; color:var(--text); margin-bottom:10px;">💻 SÍTIO MÃE MARIA / ATMOS</div>
        <button class="btn-gold" onclick="alert('Redirecionando para WhatsApp Suporte...')">SUPORTE WHATSAPP</button>
    </div>

    <table class="market-table">
        <tr><td>🌏 Ásia</td><td style="text-align:right;">21:00 - 01:00 <span style="color:var(--gold);">● Médio</span></td></tr>
        <tr><td>🇪🇺 Londres</td><td style="text-align:right;">04:00 - 09:00 <span style="color:var(--green);">● Alto</span></td></tr>
        <tr><td>🇺🇸 NY</td><td style="text-align:right;">10:00 - 14:00 <span style="color:var(--green);">● Pico</span></td></tr>
    </table>
</div>

<div class="floating-config" onclick="toggleAuth()">⚙️</div>

<div id="modalAuth">
    <h3 style="color:var(--accent); margin-bottom:20px;">ACESSO AO NÚCLEO</h3>
    <input type="password" id="accessPass" class="input-pass" placeholder="Digite a Senha">
    <button class="btn-blue" style="width:220px" onclick="verifyPass()">DESBLOQUEAR ROBÔ</button>
    <div onclick="toggleAuth()" style="color:var(--text); margin-top:25px; cursor:pointer; font-size:13px;">← Voltar</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    function renderChart() {
        const symbol = document.getElementById('pairSelector').value;
        new TradingView.widget({
            "autosize": true, "symbol": symbol, "interval": "1",
            "theme": "dark", "container_id": "chart_container", "locale": "br"
        });
    }

    // Funções de Clique dos Projetos
    function openTool(name) {
        console.log("Abrindo: " + name);
        alert("Iniciando ferramenta: " + name);
        // Exemplo: if(name === 'Pepinômetro') window.location.href = 'seu_link.html';
    }

    // Controle da Bolinha Azul e Senha
    function toggleAuth() {
        const modal = document.getElementById('modalAuth');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }

    function verifyPass() {
        const p = document.getElementById('accessPass').value;
        if(p === "123") {
            document.getElementById('botControl').style.display = 'block';
            toggleAuth();
            alert("Sistemas Hyperliquid Conectados!");
        } else {
            alert("Acesso Negado!");
        }
    }

    renderChart();
</script>
</body>
</html>
