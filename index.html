<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mestre do Scalping Pro</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #00ff88; --red: #ff3e3e; --text: #8b949e; --accent: #2f81f7; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 10px; margin: 0; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h4 { color: var(--text); font-size: 11px; margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        select { width: 100%; background: #21262d; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; font-size: 14px; }
        .price { font-size: 32px; font-weight: 800; color: var(--green); margin-bottom: 10px; font-family: monospace; }
        .status-bar { background: #0d1117; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; font-weight: bold; border-bottom: 4px solid #30363d; }
        .buy { border-bottom-color: var(--green); color: var(--green); }
        .sell { border-bottom-color: var(--red); color: var(--red); }
        #chart_container { width: 100%; height: 250px; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 1px solid #30363d; background: #000; }
        .inputs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
        label { font-size: 9px; color: var(--text); text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; background: #21262d; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        .btn-calc { width: 100%; padding: 14px; background: var(--green); color: #0d1117; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; }
        .res { margin-top: 15px; padding-top: 15px; border-top: 1px solid #30363d; text-align: left; display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; }
        .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
        .project-btn { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; padding: 8px; border-radius: 6px; font-size: 10px; text-decoration: none; font-weight: bold; text-align: center; }
        .ad-container { margin-top: 20px; padding: 12px; background: #1c2128; border-radius: 12px; border: 1px solid #ffcc0033; }
    </style>
</head>
<body>

<div class="card">
    <h4>Mestre do Scalping Pro</h4>
    
    <select id="pairSelector" onchange="initApp()">
        <option value="BINANCE:BTCUSDT">BTC/USDT</option>
        <option value="BINANCE:SOLUSDT">SOL/USDT</option>
        <option value="BINANCE:ETHUSDT">ETH/USDT</option>
        <option value="TVC:USOIL">Petróleo (WTI)</option>
    </select>

    <div class="price" id="priceText">$--.---</div>
    <div id="statusBox" class="status-bar">AGUARDANDO...</div>
    <div id="chart_container"></div>

    <div class="inputs-grid">
        <div><label>Capital ($)</label><input type="number" id="capital" value="300"></div>
        <div><label>Alavancagem</label><input type="number" id="lev" value="10"></div>
        <div><label>Ganho Alvo %</label><input type="number" id="tpP" value="0.5" step="0.1"></div>
        <div><label>Stop Loss %</label><input type="number" id="slP" value="0.7" step="0.1"></div>
    </div>

    <button class="btn-calc" onclick="calc()">Calcular Alvos</button>

    <div id="results" class="res">
        <div class="res-item"><span>🟢 TP (0.5%):</span><span id="resTP" style="color:var(--green); font-weight: bold;"></span></div>
        <div class="res-item"><span>🛑 SL (0.7%):</span><span id="resSL" style="color:var(--red); font-weight: bold;"></span></div>
    </div>

    <div class="projects-grid">
        <a href="https://site-559791916621-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Dash 97</a>
        <a href="https://pepinometro-620634786284.southamerica-east1.run.app" target="_blank" class="project-btn">Pepinômetro</a>
    </div>

    <div class="ad-container">
        <span style="color:#ffcc00; font-size: 11px; font-weight: bold;">📺 ATMOS IPTV</span>
        <a href="https://wa.me/5597991916621" target="_blank" style="display:block; background:#ffcc00; color:#000; text-decoration:none; padding:8px; border-radius:6px; font-size:10px; font-weight:bold; margin-top:8px;">TESTE GRÁTIS</a>
    </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>
<script>
    let currentPrice = 0;
    let ws;

    function initApp() {
        if (ws) ws.close();
        const symbol = document.getElementById('pairSelector').value;
        
        // Inicializa o Widget de forma segura
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "theme": "dark",
            "style": "1",
            "locale": "br",
            "container_id": "chart_container",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "studies": ["MASimple@tv-basicstudies", "RSI@tv-basicstudies"]
        });

        // Conexão simplificada com o preço
        const pair = symbol.includes("BTC") ? "btcusdt" : symbol.includes("SOL") ? "solusdt" : "ethusdt";
        ws = new WebSocket(`wss://stream.binance.com:9443/ws/${pair}@ticker`);
        ws.onmessage = (e) => {
            currentPrice = parseFloat(JSON.parse(e.data).c);
            document.getElementById('priceText').innerText = `$ ${currentPrice.toFixed(2)}`;
            const box = document.getElementById('statusBox');
            box.innerText = "SINALIZADOR ATIVO";
            box.className = "status-bar buy";
        };
    }

    function calc() {
        if (currentPrice === 0) return;
        const tp = parseFloat(document.getElementById('tpP').value);
        const sl = parseFloat(document.getElementById('slP').value);
        document.getElementById('resTP').innerText = `$ ${(currentPrice * (1 + tp/100)).toFixed(2)}`;
        document.getElementById('resSL').innerText = `$ ${(currentPrice * (1 - sl/100)).toFixed(2)}`;
        document.getElementById('results').style.display = 'block';
    }

    // Inicia após o carregamento completo da página
    window.onload = initApp;
</script>
</body>
</html>
